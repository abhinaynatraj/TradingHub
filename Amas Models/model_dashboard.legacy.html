  function renderTradesBody() {
    var rows = tradesState.rows.slice();
    var key = tradesState.sortKey, dir = tradesState.sortDir;

    rows.sort(function (a, b) {
      var av = a[key], bv = b[key];
      // booleans (draw_hit) → coerce to 0/1
      if (typeof av === 'boolean' || typeof bv === 'boolean') {
        av = av ? 1 : 0;
        bv = bv ? 1 : 0;
      }
      var aNull = av == null || (typeof av === 'number' && isNaN(av));
      var bNull = bv == null || (typeof bv === 'number' && isNaN(bv));
      if (aNull && bNull) return 0;
      if (aNull) return 1;
      if (bNull) return -1;
      if (av < bv) return dir === 'asc' ? -1 : 1;
      if (av > bv) return dir === 'asc' ? 1 : -1;
      return 0;
    });

    // Update sort arrows
    document.querySelectorAll('#trades-head th').forEach(function (th) {
      th.classList.remove('sort-asc', 'sort-desc');
      var arr = th.querySelector('.sort-arrow');
      if (th.dataset.sortKey === key) {
        th.classList.add(dir === 'asc' ? 'sort-asc' : 'sort-desc');
        if (arr) arr.textContent = dir === 'asc' ? '▲' : '▼';
      } else if (arr) {
        arr.textContent = '▼';
      }
    });

    var total = rows.length;
    var start = tradesState.page * tradesState.pageSize;
    var end = Math.min(total, start + tradesState.pageSize);
    var slice = rows.slice(start, end);

    var frag = document.createDocumentFragment();
    slice.forEach(function (t) {
      var tr = document.createElement('tr');
      var dirCell = '<td class="' + (t.direction === 'long' ? 'long-cell' : 'short-cell') + '">' +
                    esc(t.direction || '') + '</td>';
      var outClass = t.outcome === 'TP' ? 'tp-cell'
                   : t.outcome === 'SL' ? 'sl-cell'
                   : 'exp-cell';
      var rClass = (t.r > 0) ? 'tp-cell' : (t.r < 0 ? 'sl-cell' : '');
      tr.innerHTML =
        '<td>' + esc(truncTs(t.anchor_ts)) + '</td>' +
        '<td>' + esc(truncTs(t.entry_ts)) + '</td>' +
        '<td>' + esc(t.resolution_ts ? truncTs(t.resolution_ts) : '—') + '</td>' +
        dirCell +
        '<td>' + esc(t.entry_pattern || '') + '</td>' +
        '<td>' + fmtNum(t.entry_price, 2) + '</td>' +
        '<td>' + fmtNum(t.sl_price, 2) + '</td>' +
        '<td>' + fmtNum(t.tp_price, 2) + '</td>' +
        '<td>' + fmtNum(t.risk_pts, 2) + '</td>' +
        '<td class="' + outClass + '">' + esc(t.outcome || '') + '</td>' +
        '<td class="' + rClass + '">' + (t.r != null ? (t.r >= 0 ? '+' : '') + t.r.toFixed(2) : '—') + '</td>' +
        '<td>' + fmtNum(t.mae_pts, 2) + '</td>' +
        '<td>' + fmtNum(t.mfe_pts, 2) + '</td>' +
        '<td>' + (t.draw_hit ? '<span class="tp-cell">✓</span>' : '<span style="color:var(--text-muted)">✗</span>') + '</td>';
      frag.appendChild(tr);
    });
    var body = document.getElementById('trades-body');
    body.innerHTML = '';
    body.appendChild(frag);

    document.getElementById('trades-info').textContent =
      'Showing ' + (total === 0 ? 0 : start + 1) + '–' + end + ' of ' + total;
    document.getElementById('trades-prev').disabled = tradesState.page === 0;
    document.getElementById('trades-next').disabled = end >= total;
  }

  // ── Tab 5: WALK-FORWARD (Sprint 3 MVP) ──────────────────────────────────
  // Client-side walk-forward: split chronologically-sorted trades into N
  // equal-size pairs of (train, test) windows. For each pair, aggregate
  // train and test stats and report the overfit score = test_ev / train_ev.
  //
  // This is a minimum-viable port — Fractal Sweep's js/walkforward.js is
  // significantly richer (MAE stop sweep, MFE target sweep, multi-variant).
  // The MVP delivers the core stability signal: does the train-period edge
  // hold up out-of-sample?
  var wfState = { pairs: 3 };

  function _shortDate(ts) {
    if (!ts) return '—';
    try { return String(ts).slice(0, 10); } catch (e) { return '—'; }
  }
  function _overfitClass(score) {
    // score = test_ev / train_ev × 100. ≥80% = good, 50–80% = mid, <50% = bad.
    // Also bad if signs flip (score < 0).
    if (score == null || isNaN(score)) return '';
    if (score >= 80) return 'good';
    if (score >= 50) return 'mid';
    return 'bad';
  }

  function _wfSplit(trades, nPairs) {
    // Sort by entry_ts ascending. Each "pair" is half train, half test;
    // pairs themselves don't overlap (true walk-forward, not rolling).
    var sorted = trades.slice().sort(function (a, b) {
      var x = a.entry_ts || '', y = b.entry_ts || '';
      return x < y ? -1 : x > y ? 1 : 0;
    });
    var perPair = Math.floor(sorted.length / nPairs);
    var pairs = [];
    for (var i = 0; i < nPairs; i++) {
      var start = i * perPair;
      var end = (i === nPairs - 1) ? sorted.length : (i + 1) * perPair;
      var slice = sorted.slice(start, end);
      var half = Math.floor(slice.length / 2);
      pairs.push({
        train: slice.slice(0, half),
        test:  slice.slice(half),
      });
    }
    return pairs;
  }

  function renderWalkforward(model) {
    var panel = document.getElementById('panel-walkforward');
    var trades = (model.trades || []);

    if (trades.length < 20) {
      panel.innerHTML =
        '<div class="placeholder">' +
          '<div class="placeholder-icon">⏳</div>' +
          '<div class="placeholder-title">Not enough trades for walk-forward</div>' +
          '<p class="placeholder-body">' +
            'Need at least 20 trades to split into meaningful train/test pairs. ' +
            'This model has ' + trades.length + '.' +
          '</p>' +
        '</div>';
      return;
    }

    panel.innerHTML =
      '<div class="card">' +
        '<div class="card-title">Walk-Forward Stability</div>' +
        '<div class="card-sub">' +
          'Splits the chronologically-ordered trade list into N equal-size train→test pairs. ' +
          'Overfit score = test EV / train EV × 100. ' +
          '<span style="color:var(--green)">≥80% = stable</span>, ' +
          '<span style="color:var(--amber)">50-80% = mixed</span>, ' +
          '<span style="color:var(--red)">&lt;50% (or sign flip) = overfit</span>.' +
        '</div>' +
        '<div class="wf-controls">' +
          '<span>Pairs:</span>' +
          '<button class="wf-pairs-btn" data-pairs="3" type="button">3</button>' +
          '<button class="wf-pairs-btn" data-pairs="5" type="button">5</button>' +
          '<button class="wf-pairs-btn" data-pairs="7" type="button">7</button>' +
        '</div>' +
        '<div class="tbl-wrap"><table class="tbl" id="wf-tbl">' +
          '<thead><tr>' +
            '<th>Pair</th><th>Train Range</th><th>N</th><th>Train WR</th><th>Train EV</th>' +
            '<th>Test Range</th><th>N</th><th>Test WR</th><th>Test EV</th>' +
            '<th>Overfit %</th>' +
          '</tr></thead>' +
          '<tbody id="wf-body"></tbody>' +
        '</table></div>' +
      '</div>';

    // Pairs-count button wiring
    document.querySelectorAll('.wf-pairs-btn').forEach(function (btn) {
      if (parseInt(btn.dataset.pairs, 10) === wfState.pairs) btn.classList.add('active');
      btn.addEventListener('click', function () {
        wfState.pairs = parseInt(btn.dataset.pairs, 10);
        document.querySelectorAll('.wf-pairs-btn').forEach(function (b) {
          b.classList.toggle('active', b === btn);
        });
        renderWalkforwardBody(trades);
      });
    });

    renderWalkforwardBody(trades);
  }

  function renderWalkforwardBody(trades) {
    var body = document.getElementById('wf-body');
    if (!body) return;
    var pairs = _wfSplit(trades, wfState.pairs);
    var frag = document.createDocumentFragment();
    pairs.forEach(function (pair, i) {
      var trainAgg = aggTrades(pair.train);
      var testAgg  = aggTrades(pair.test);
      var trainRange = pair.train.length
        ? _shortDate(pair.train[0].entry_ts) + ' → ' + _shortDate(pair.train[pair.train.length - 1].entry_ts)
        : '—';
      var testRange = pair.test.length
        ? _shortDate(pair.test[0].entry_ts) + ' → ' + _shortDate(pair.test[pair.test.length - 1].entry_ts)
        : '—';
      // Overfit % = test EV / train EV × 100. If train EV is zero or undefined,
      // result is undefined. If signs differ, score will be negative (bad).
      var overfit = null;
      if (trainAgg.ev != null && testAgg.ev != null && Math.abs(trainAgg.ev) > 1e-9) {
        overfit = testAgg.ev / trainAgg.ev * 100;
      }
      var ofCls = _overfitClass(overfit);
      var ofStr = overfit != null ? overfit.toFixed(1) + '%' : '—';
      function pct(x) { return x != null ? (x * 100).toFixed(1) + '%' : '—'; }
      function r(x) { return x != null ? (x >= 0 ? '+' : '') + x.toFixed(3) + 'R' : '—'; }

      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td>' + (i + 1) + '</td>' +
        '<td>' + esc(trainRange) + '</td>' +
        '<td>' + trainAgg.n + '</td>' +
        '<td>' + pct(trainAgg.wr) + '</td>' +
        '<td>' + r(trainAgg.ev) + '</td>' +
        '<td>' + esc(testRange) + '</td>' +
        '<td>' + testAgg.n + '</td>' +
        '<td>' + pct(testAgg.wr) + '</td>' +
        '<td>' + r(testAgg.ev) + '</td>' +
        '<td><span class="wf-overfit ' + ofCls + '">' + ofStr + '</span></td>';
      frag.appendChild(tr);
    });
    body.innerHTML = '';
    body.appendChild(frag);
  }

  // ── Tab 6: SPEC ─────────────────────────────────────────────────────────
  function renderSpec(model) {
    var panel = document.getElementById('panel-spec');
    if (model.spec_html && model.spec_html.length > 0) {
      panel.innerHTML = '<div class="card"><div class="card-title">Model Spec</div>' +
                        '<div class="spec-content">' + model.spec_html + '</div></div>';
      return;
    }
    panel.innerHTML =
      '<div class="placeholder">' +
        '<div class="placeholder-icon">📜</div>' +
        '<div class="placeholder-title">Spec · Coming in Phase 4</div>' +
        '<p class="placeholder-body">' +
          'Phase 4 will pre-render <code>docs/model_specs.md</code> for the selected model ' +
          'into <code>spec_html</code> on the model_stats.json payload.' +
        '</p>' +
      '</div>';
  }
})();
</script>

</body>
