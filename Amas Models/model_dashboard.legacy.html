<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Amas Models · Probability Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
  // Early-paint theme: read shared hub-theme key BEFORE any pixels render.
  // Avoids a flash of wrong theme on load.
  (function () {
    var theme = localStorage.getItem('hub-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#10b981;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;--purple:#8b5cf6;--cyan:#06b6d4;
  --font-display:'Inter',system-ui,-apple-system,sans-serif;
  --font-data:'JetBrains Mono','SF Mono',Menlo,monospace;
  --font-body:'Inter',system-ui,-apple-system,sans-serif;
  --ease:cubic-bezier(0.16,1,0.3,1);
}
/* CSS variable names mirror Fractal Sweep's dashboard so future migrations are easy. */
[data-theme="dark"]{
  --bg:#0a0e17;--bg-card:#111827;--bg-raised:#1a2235;--bg-hover:#1e2d42;
  --border:#1e2d42;--border-mid:#243447;--border-hi:#2e4460;
  --text-primary:#e2eaf4;--text-secondary:#8ba4bc;--text-muted:#4a6480;--text-faint:#2a3f55;
  --shadow:0 1px 3px rgba(0,0,0,.5),0 4px 16px rgba(0,0,0,.3);
  --shadow-lg:0 8px 32px rgba(0,0,0,.5);
  --green-tint:rgba(16,185,129,.1);--green-border:rgba(16,185,129,.25);
  --red-tint:rgba(239,68,68,.1);--red-border:rgba(239,68,68,.25);
  --amber-tint:rgba(245,158,11,.1);--amber-border:rgba(245,158,11,.25);
  --accent:#06b6d4; /* cyan to distinguish Amas from Fractal Sweep's green, but same family */
  --accent-glow:0 0 24px rgba(6,182,212,.18);
  --glass-bg:rgba(17,24,39,.55);
  --glass-bg-strong:rgba(26,34,53,.7);
  --glass-border:rgba(255,255,255,.06);
  --glass-border-hi:rgba(255,255,255,.1);
  --glass-blur:saturate(160%) blur(18px);
}
[data-theme="light"]{
  --bg:#f8fafc;--bg-card:#ffffff;--bg-raised:#f1f5f9;--bg-hover:#e2e8f0;
  --border:#e2e8f0;--border-mid:#cbd5e1;--border-hi:#94a3b8;
  --text-primary:#0f172a;--text-secondary:#334155;--text-muted:#64748b;--text-faint:#94a3b8;
  --shadow:0 1px 3px rgba(15,23,42,.06),0 4px 12px rgba(15,23,42,.04);
  --shadow-lg:0 8px 32px rgba(15,23,42,.1);
  --green-tint:rgba(16,185,129,.1);--green-border:rgba(16,185,129,.35);
  --red-tint:rgba(239,68,68,.1);--red-border:rgba(239,68,68,.35);
  --amber-tint:rgba(245,158,11,.12);--amber-border:rgba(245,158,11,.35);
  --accent:#0891b2;
  --accent-glow:0 0 24px rgba(8,145,178,.1);
  --glass-bg:rgba(255,255,255,.65);
  --glass-bg-strong:rgba(255,255,255,.85);
  --glass-border:rgba(15,23,42,.08);
  --glass-border-hi:rgba(15,23,42,.14);
  --glass-blur:saturate(180%) blur(20px);
}
/* Gold + indigo themes — parity with the rest of the Statistic.ally hub.
   Keeps Amas's --bg-card / --bg-raised / --bg-hover convention rather than
   adopting shared.css's --bg-elev-1/2/3, so the rest of the dashboard's
   inline CSS works unchanged. */
[data-theme="gold"]{
  --bg:#0a0806;--bg-card:#14110c;--bg-raised:#1f1a12;--bg-hover:#352a1c;
  --border:#2a2217;--border-mid:#3d2f1d;--border-hi:#5a4523;
  --text-primary:#f7e9c8;--text-secondary:#c9a96a;--text-muted:#7a6236;--text-faint:#4a3a1f;
  --shadow:0 1px 3px rgba(0,0,0,.7),0 4px 20px rgba(212,175,55,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.6);
  --green:#d4af37;--red:#c0432f;--amber:#e5b743;--blue:#8a6d2a;--purple:#b8860b;
  --green-tint:rgba(212,175,55,.12);--green-border:rgba(212,175,55,.4);
  --red-tint:rgba(192,67,47,.12);--red-border:rgba(192,67,47,.4);
  --amber-tint:rgba(229,183,67,.12);--amber-border:rgba(229,183,67,.4);
  --accent:#d4af37;
  --accent-glow:0 0 28px rgba(212,175,55,.18);
  --glass-bg:rgba(20,17,12,.55);
  --glass-bg-strong:rgba(31,26,18,.7);
  --glass-border:rgba(212,175,55,.08);
  --glass-border-hi:rgba(212,175,55,.14);
  --glass-blur:saturate(160%) blur(18px);
}
[data-theme="indigo"]{
  --bg:#0f0c1e;--bg-card:#1a1530;--bg-raised:#24203d;--bg-hover:#363057;
  --border:#2a2450;--border-mid:#3a3263;--border-hi:#524676;
  --text-primary:#ede9fe;--text-secondary:#b9afe4;--text-muted:#7e75a8;--text-faint:#4b4568;
  --shadow:0 1px 3px rgba(0,0,0,.5),0 6px 22px rgba(139,124,254,.12);
  --shadow-lg:0 8px 32px rgba(0,0,0,.5);
  --green:#34d399;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa;--purple:#a78bfa;
  --green-tint:rgba(52,211,153,.12);--green-border:rgba(52,211,153,.4);
  --red-tint:rgba(248,113,113,.12);--red-border:rgba(248,113,113,.4);
  --amber-tint:rgba(251,191,36,.12);--amber-border:rgba(251,191,36,.4);
  --accent:#8b7cfe;
  --accent-glow:0 0 28px rgba(139,124,254,.22);
  --glass-bg:rgba(26,21,48,.55);
  --glass-bg-strong:rgba(36,32,61,.7);
  --glass-border:rgba(139,124,254,.1);
  --glass-border-hi:rgba(139,124,254,.18);
  --glass-blur:saturate(160%) blur(18px);
}

html,body{
  background:var(--bg);
  color:var(--text-primary);
  font-family:var(--font-body);
  font-size:14px;
  line-height:1.6;
  min-height:100vh;
  overflow-x:hidden;
  transition:background .25s var(--ease),color .25s var(--ease);
}

/* ── HEADER ─────────────────────────────────────────────────────────────── */
.hdr{
  background:var(--glass-bg);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border-bottom:1px solid var(--glass-border);
  padding:0 28px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:var(--shadow);
}
@supports not (backdrop-filter:blur(10px)){.hdr{background:var(--bg-card)}}

.hdr-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.hdr-right{display:flex;align-items:center;gap:10px}

.hub-back{
  display:flex;align-items:center;gap:6px;
  text-decoration:none;
  padding:6px 10px;
  border-radius:8px;
  color:var(--text-muted);
  font-size:13px;
  transition:background .15s,color .15s;
}
.hub-back:hover{background:var(--bg-raised);color:var(--text-primary)}
.hub-back-glyph{font-size:14px;line-height:1}

.hdr-wordmark{
  font-family:var(--font-display);
  font-size:18px;
  font-weight:800;
  letter-spacing:-0.02em;
  color:var(--text-primary);
  line-height:1;
}
.hdr-wordmark em{color:var(--accent);font-style:normal}

.hdr-divider{width:1px;height:24px;background:var(--border-mid)}

.hdr-select{
  font-family:var(--font-data);
  font-size:11px;
  font-weight:500;
  letter-spacing:0.04em;
  padding:6px 28px 6px 12px;
  border-radius:8px;
  border:1px solid var(--border-mid);
  background:var(--bg-raised);
  color:var(--text-secondary);
  cursor:pointer;
  appearance:none;
  -webkit-appearance:none;
  background-image:linear-gradient(45deg,transparent 50%,var(--text-muted) 50%),linear-gradient(135deg,var(--text-muted) 50%,transparent 50%);
  background-position:right 12px top 50%,right 8px top 50%;
  background-size:4px 4px,4px 4px;
  background-repeat:no-repeat;
  transition:border-color .15s,color .15s,background-color .15s;
  max-width:280px;
}
.hdr-select:hover{border-color:var(--border-hi);color:var(--text-primary)}
.hdr-select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--green-tint)}
.hdr-select:disabled{opacity:.6;cursor:not-allowed}

.hdr-select-label{
  font-family:var(--font-data);
  font-size:10px;
  letter-spacing:0.08em;
  color:var(--text-muted);
  text-transform:uppercase;
  margin-right:-6px;
}

/* 4-button theme picker — parity with Fractal Sweep / NPG Sweep / hub.
   Buttons emit one of: dark, light, gold, indigo. JS wires data-theme attr
   + persists to localStorage['hub-theme']. */
.theme-picker{
  display:inline-flex;align-items:center;gap:1px;padding:3px;
  background:var(--bg-raised);border:1px solid var(--border-mid);
  border-radius:8px;
}
.theme-opt{
  width:28px;height:26px;display:inline-flex;align-items:center;
  justify-content:center;background:transparent;border:none;
  border-radius:5px;cursor:pointer;color:var(--text-muted);
  font-size:13px;line-height:1;
  transition:background .12s var(--ease),color .12s var(--ease);
}
.theme-opt:hover{color:var(--text-primary);background:var(--bg-hover)}
.theme-opt.active{
  background:var(--bg-card);color:var(--accent);
  box-shadow:0 0 0 1px var(--border-hi);
}
[data-theme="indigo"] .theme-opt.active{
  background:linear-gradient(135deg,#a78bfa 0%,#8b7cfe 50%,#6b5ce0 100%);color:#fff;
}
/* Recalculate button — mirror Fractal's compact pill style. */
.recalc-btn{
  background:var(--bg-raised);border:1px solid var(--border-mid);
  border-radius:8px;color:var(--text-secondary);cursor:pointer;
  font-family:var(--font-data);font-size:11px;
  padding:7px 11px;height:32px;
  display:inline-flex;align-items:center;gap:5px;
  transition:all .15s var(--ease);
}
.recalc-btn:hover:not(:disabled){background:var(--bg-hover);color:var(--text-primary);border-color:var(--border-hi)}
.recalc-btn:disabled{opacity:.7;cursor:wait}

/* ── TAB BAR ────────────────────────────────────────────────────────────── */
.tab-bar{
  background:var(--bg-card);
  border-bottom:1px solid var(--border);
  padding:0 28px;
  display:flex;
  gap:2px;
  overflow-x:auto;
  position:sticky;
  top:60px;
  z-index:90;
}
.tab{
  font-family:var(--font-body);
  font-size:13px;
  font-weight:500;
  padding:14px 18px 13px;
  color:var(--text-muted);
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;
  white-space:nowrap;
  user-select:none;
  background:none;
  border-left:none;
  border-right:none;
  border-top:none;
}
.tab:hover{color:var(--text-secondary)}
.tab.active{color:var(--text-primary);border-bottom-color:var(--accent)}

/* ── MAIN ───────────────────────────────────────────────────────────────── */
main{
  max-width:1400px;
  margin:0 auto;
  padding:32px 28px 80px;
}

.placeholder{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  min-height:50vh;
  padding:48px 24px;
}
.placeholder-icon{
  font-size:42px;
  margin-bottom:18px;
  opacity:.4;
}
.placeholder-title{
  font-family:var(--font-display);
  font-size:18px;
  font-weight:700;
  color:var(--text-primary);
  margin-bottom:10px;
  letter-spacing:-0.01em;
}
.placeholder-body{
  font-size:13.5px;
  color:var(--text-secondary);
  max-width:520px;
  line-height:1.65;
  margin-bottom:6px;
}
.placeholder-body code{
  font-family:var(--font-data);
  font-size:12px;
  background:var(--bg-raised);
  border:1px solid var(--border);
  padding:1px 6px;
  border-radius:4px;
  color:var(--text-primary);
}

.error-card{
  max-width:560px;
  margin:60px auto;
  padding:20px 24px;
  background:var(--red-tint);
  border:1px solid var(--red-border);
  border-radius:12px;
  display:flex;
  gap:14px;
  align-items:flex-start;
}
.error-card-icon{font-size:20px;line-height:1.4;flex-shrink:0}
.error-card-title{
  font-weight:700;
  color:var(--red);
  margin-bottom:4px;
  font-size:13px;
}
.error-card-body{
  color:var(--text-secondary);
  font-size:13px;
  line-height:1.55;
}
.error-card-body code{
  font-family:var(--font-data);
  font-size:12px;
  background:var(--bg-raised);
  border:1px solid var(--border-mid);
  padding:1px 6px;
  border-radius:4px;
  color:var(--text-primary);
}

#model-content{display:none}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── PANEL / CARD STYLING ───────────────────────────────────────────────── */
.card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px 22px;
  margin-bottom:18px;
  box-shadow:var(--shadow);
}
.card-title{
  font-family:var(--font-display);
  font-size:13px;
  font-weight:700;
  letter-spacing:0.04em;
  text-transform:uppercase;
  color:var(--text-secondary);
  margin-bottom:14px;
}
.card-sub{
  font-size:12px;
  color:var(--text-muted);
  margin-bottom:12px;
}

/* Collapsible model overview (closed by default) */
.model-overview-details{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  margin-bottom:18px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.model-overview-summary{
  padding:14px 22px;
  font-family:var(--font-display);
  font-size:13px;
  font-weight:700;
  letter-spacing:0.04em;
  text-transform:uppercase;
  color:var(--text-secondary);
  cursor:pointer;
  list-style:none;
  user-select:none;
  display:flex;
  align-items:center;
  gap:10px;
}
.model-overview-summary::-webkit-details-marker{display:none;}
.model-overview-summary::before{
  content:'▸';
  font-size:11px;
  color:var(--accent);
  transition:transform 0.15s ease;
  display:inline-block;
}
.model-overview-details[open] .model-overview-summary::before{
  transform:rotate(90deg);
}
.model-overview-summary:hover{
  background:var(--bg-hover);
}
.model-overview-list{
  margin:0;
  padding:0 28px 18px 44px;
  font-size:13px;
  line-height:1.55;
  color:var(--text-primary);
}
.model-overview-list li{
  margin-bottom:8px;
}
.model-overview-list li:last-child{margin-bottom:0;}
.model-overview-list strong{color:var(--text-primary);}
.model-overview-list em{color:var(--text-secondary); font-style:italic;}
.model-overview-list code{
  font-family:var(--font-data);
  font-size:12px;
  background:var(--bg-raised);
  padding:1px 5px;
  border-radius:3px;
  color:var(--text-primary);
}

/* Headline strip / metric tiles */
.metric-strip{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:12px;
  margin-bottom:18px;
}
.metric-tile{
  background:var(--bg-raised);
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px 16px;
  display:flex;
  flex-direction:column;
  gap:4px;
}
.metric-label{
  font-family:var(--font-data);
  font-size:10px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--text-muted);
}
.metric-value{
  font-family:var(--font-data);
  font-size:20px;
  font-weight:600;
  color:var(--text-primary);
  letter-spacing:-0.01em;
}
.metric-sub{
  font-family:var(--font-data);
  font-size:11px;
  color:var(--text-muted);
}
.metric-value.pos{color:var(--green)}
.metric-value.neg{color:var(--red)}

.warn-chip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 12px;
  background:var(--amber-tint);
  border:1px solid var(--amber-border);
  border-radius:999px;
  color:var(--amber);
  font-size:12px;
  font-weight:600;
  margin-bottom:12px;
}

.split-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:18px;
}
.split-tile{
  background:var(--bg-raised);
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px 16px;
}
.split-tile.long{border-left:3px solid var(--green)}
.split-tile.short{border-left:3px solid var(--red)}
.split-label{
  font-family:var(--font-data);
  font-size:10px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--text-muted);
  margin-bottom:4px;
}
.split-value{
  font-family:var(--font-data);
  font-size:16px;
  color:var(--text-primary);
}

/* Tables */
.tbl-wrap{
  overflow-x:auto;
  border:1px solid var(--border);
  border-radius:10px;
  background:var(--bg-card);
}
.tbl{
  width:100%;
  border-collapse:collapse;
  font-family:var(--font-data);
  font-size:12px;
}
.tbl th, .tbl td{
  padding:10px 12px;
  text-align:right;
  border-bottom:1px solid var(--border);
  white-space:nowrap;
}
.tbl th:first-child, .tbl td:first-child{text-align:left}
.tbl thead th{
  background:var(--bg-raised);
  color:var(--text-secondary);
  font-weight:600;
  font-size:11px;
  letter-spacing:0.04em;
  text-transform:uppercase;
  position:sticky;
  top:0;
  cursor:pointer;
  user-select:none;
}
.tbl thead th.sortable:hover{color:var(--text-primary);background:var(--bg-hover)}
.tbl thead th .sort-arrow{
  display:inline-block;
  margin-left:4px;
  opacity:.4;
  font-size:9px;
}
.tbl thead th.sort-asc .sort-arrow,
.tbl thead th.sort-desc .sort-arrow{opacity:1;color:var(--accent)}
.tbl tbody tr:hover{background:var(--bg-hover)}
.tbl tbody tr:last-child td{border-bottom:none}

.tbl .ci{
  display:block;
  font-size:10.5px;
  color:var(--text-muted);
  margin-top:1px;
}
.tbl .lowN{color:var(--amber);margin-left:4px}

.long-cell{color:var(--green)}
.short-cell{color:var(--red)}
.tp-cell{color:var(--green)}
.sl-cell{color:var(--red)}
.exp-cell{color:var(--amber)}

.tbl-scroll{
  max-height:680px;
  overflow-y:auto;
}

/* Filters tab specifics */
.row-baseline td{background:var(--bg-raised);font-weight:600}
.row-best td{background:var(--green-tint)}
.tag{
  display:inline-block;
  padding:1px 7px;
  border-radius:999px;
  font-size:10px;
  font-weight:600;
  letter-spacing:0.05em;
  text-transform:uppercase;
  margin-left:6px;
}
.tag-baseline{background:var(--bg-hover);color:var(--text-secondary);border:1px solid var(--border-mid)}
.tag-best{background:var(--green-tint);color:var(--green);border:1px solid var(--green-border)}

/* ── Filter chip bar (Sprint 3) ─────────────────────────────────────────── */
.chip-bar{
  display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 6px;
}
.chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 11px;border-radius:999px;
  background:var(--bg-raised);border:1px solid var(--border-mid);
  color:var(--text-secondary);font-family:var(--font-data);font-size:12px;
  cursor:pointer;transition:all .15s var(--ease);user-select:none;
}
.chip:hover{background:var(--bg-hover);color:var(--text-primary);border-color:var(--border-hi)}
.chip.active{background:var(--green-tint);color:var(--green);border-color:var(--green-border)}
.chip .chip-delta{
  font-size:10px;font-weight:600;letter-spacing:0.02em;padding-left:2px;
  color:var(--text-muted);
}
.chip.active .chip-delta{color:var(--green)}
.chip-delta.neg{color:var(--red)}
.chip-summary{
  display:flex;flex-wrap:wrap;gap:14px;margin:8px 0 18px;
  padding:10px 14px;background:var(--bg-card);
  border:1px solid var(--border);border-radius:8px;
  font-family:var(--font-data);font-size:12px;
}
.chip-summary > div{display:flex;flex-direction:column;gap:2px}
.chip-summary .lbl{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted)}
.chip-summary .val{font-size:13px;color:var(--text-primary);font-weight:600}
.chip-summary .val.pos{color:var(--green)}
.chip-summary .val.neg{color:var(--red)}

/* ── Walk-forward MVP table (Sprint 3) ──────────────────────────────────── */
.wf-controls{
  display:flex;align-items:center;gap:10px;margin:8px 0 14px;
  font-family:var(--font-data);font-size:12px;color:var(--text-secondary);
}
.wf-pairs-btn{
  padding:5px 12px;border-radius:6px;
  background:var(--bg-raised);border:1px solid var(--border-mid);
  color:var(--text-secondary);cursor:pointer;font-family:var(--font-data);font-size:11px;
  transition:all .15s var(--ease);
}
.wf-pairs-btn:hover{background:var(--bg-hover);color:var(--text-primary)}
.wf-pairs-btn.active{background:var(--green-tint);color:var(--green);border-color:var(--green-border)}
.wf-overfit{font-family:var(--font-data);font-size:12px;font-weight:600}
.wf-overfit.good{color:var(--green)}
.wf-overfit.mid{color:var(--amber)}
.wf-overfit.bad{color:var(--red)}

/* Pagination */
.pager{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 4px 0;
  font-family:var(--font-data);
  font-size:12px;
  color:var(--text-muted);
}
.pager-btn{
  font-family:var(--font-data);
  font-size:12px;
  padding:6px 12px;
  border-radius:6px;
  border:1px solid var(--border-mid);
  background:var(--bg-raised);
  color:var(--text-secondary);
  cursor:pointer;
  transition:all .15s var(--ease);
}
.pager-btn:hover:not(:disabled){background:var(--bg-hover);color:var(--text-primary);border-color:var(--border-hi)}
.pager-btn:disabled{opacity:.4;cursor:not-allowed}
.pager-info{margin-left:auto}

/* Equity curve */
.equity-wrap{
  background:var(--bg-raised);
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px 16px;
}
.equity-svg{display:block;width:100%;max-width:100%;height:auto}

footer{
  text-align:center;
  padding:24px;
  font-size:11px;
  color:var(--text-muted);
  border-top:1px solid var(--border);
  font-family:var(--font-data);
  letter-spacing:0.02em;
}

/* ── MODEL WRITE-UP TAB ─────────────────────────────────────────────── */
.writeup{
  max-width:720px;
  margin:0 auto;
  font-family:var(--font-body);
  font-size:15.5px;
  line-height:1.72;
  color:var(--text-primary);
  letter-spacing:-0.005em;
}
.writeup .eyebrow{
  font-family:var(--font-data);
  font-size:11px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--text-muted);
  margin-bottom:10px;
}
.writeup h1{
  font-family:var(--font-display);
  font-size:34px;
  font-weight:700;
  letter-spacing:-0.02em;
  line-height:1.15;
  color:var(--text-primary);
  margin:0 0 14px;
}
.writeup h2{
  font-family:var(--font-display);
  font-size:24px;
  font-weight:700;
  letter-spacing:-0.015em;
  line-height:1.25;
  color:var(--text-primary);
  margin:56px 0 4px;
  scroll-margin-top:80px;
}
.writeup h2 .num{
  display:block;
  font-family:var(--font-data);
  font-size:11px;
  font-weight:600;
  letter-spacing:0.15em;
  color:var(--accent);
  margin-bottom:6px;
}
.writeup h3{
  font-family:var(--font-display);
  font-size:17px;
  font-weight:700;
  color:var(--text-primary);
  margin:32px 0 10px;
  letter-spacing:-0.005em;
}
.writeup h4{
  font-family:var(--font-display);
  font-size:14.5px;
  font-weight:700;
  color:var(--text-primary);
  margin:22px 0 6px;
  letter-spacing:0.005em;
}
.writeup h2 + p,
.writeup h3 + p{margin-top:8px}
.writeup p{margin:0 0 16px; color:var(--text-primary)}
.writeup p + p{margin-top:-4px}
.writeup ul, .writeup ol{margin:0 0 18px 4px; padding:0 0 0 22px}
.writeup li{margin-bottom:8px; padding-left:4px}
.writeup li::marker{color:var(--text-muted)}
.writeup li > ul, .writeup li > ol{margin-top:8px; margin-bottom:0}
.writeup strong{color:var(--text-primary); font-weight:700}
.writeup em{color:var(--text-secondary); font-style:italic}
.writeup a{color:var(--accent); text-decoration:none; border-bottom:1px solid transparent; transition:border-color .15s ease}
.writeup a:hover{border-bottom-color:var(--accent)}
.writeup code{
  font-family:var(--font-data);
  font-size:0.86em;
  background:var(--bg-raised);
  padding:1px 6px;
  border-radius:4px;
  color:var(--text-primary);
  white-space:nowrap;
}

/* Subtle horizontal rule between major sections */
.writeup hr{
  border:none;
  border-top:1px solid var(--border);
  margin:48px 0;
}

/* Lede / hero block */
.writeup .lede{
  font-family:var(--font-display);
  font-size:18px;
  line-height:1.55;
  color:var(--text-secondary);
  font-weight:400;
  margin:0 0 40px;
  padding:0;
  background:none;
  border:none;
  border-radius:0;
}
.writeup .lede strong{color:var(--text-primary)}
.writeup .lede em{color:var(--text-primary); font-style:italic}

/* TOC — minimal sidebar style */
.writeup .toc{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:18px 22px 16px;
  margin:0 0 56px;
}
.writeup .toc-title{
  font-family:var(--font-data);
  font-size:10px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--text-muted);
  margin-bottom:10px;
}
.writeup .toc ol{
  margin:0;
  padding:0;
  list-style:none;
  columns:2;
  column-gap:32px;
  font-size:13.5px;
}
.writeup .toc li{
  margin:0 0 6px;
  padding:0;
  break-inside:avoid;
  font-family:var(--font-body);
  display:flex;
  gap:8px;
  align-items:baseline;
}
.writeup .toc li::marker{content:none}
.writeup .toc .toc-num{
  font-family:var(--font-data);
  font-size:11px;
  color:var(--text-muted);

}
.writeup .toc a{
  color:var(--text-secondary);
  border-bottom:none;
}
.writeup .toc a:hover{color:var(--accent); border-bottom:none}

/* Pull-quotes */
.writeup .quote{
  margin:18px 0 22px;
  padding:0 0 0 20px;
  border-left:2px solid var(--accent);
  font-family:var(--font-display);
  font-size:16px;
  font-style:italic;
  color:var(--text-primary);
  line-height:1.55;
  background:none;
  border-radius:0;
}
.writeup .quote .src{
  display:block;
  margin-top:8px;
  font-size:11px;
  font-style:normal;
  color:var(--text-muted);
  font-family:var(--font-data);
  letter-spacing:0.05em;
  font-weight:400;
}

/* Callouts */
.writeup .callout{
  margin:24px 0;
  padding:18px 20px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--bg-card);
}
.writeup .callout > *:last-child{margin-bottom:0}
.writeup .callout.tie{
  border-color:rgba(6,182,212,.3);
  background:rgba(6,182,212,.05);
}
.writeup .callout.warn{
  border-color:var(--amber-border);
  background:var(--amber-tint);
}
.writeup .callout-title{
  font-family:var(--font-data);
  font-size:10px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--text-secondary);
  margin-bottom:10px;
  font-weight:700;
}
.writeup .callout.tie .callout-title{color:var(--accent)}
.writeup .callout.warn .callout-title{color:var(--amber)}

/* Phase tiles — 3-up */
.writeup .phase-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin:22px 0 28px;
}
.writeup .phase-tile{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:18px 18px 16px;
}
.writeup .phase-tile .ph-label{
  font-family:var(--font-data);
  font-size:10px;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:8px;
}
.writeup .phase-tile .ph-name{
  font-family:var(--font-display);
  font-weight:700;
  font-size:15px;
  color:var(--text-primary);
  margin-bottom:8px;
  letter-spacing:-0.005em;
}
.writeup .phase-tile .ph-body{
  font-size:13px;
  color:var(--text-secondary);
  line-height:1.55;
}
.writeup .phase-tile .ph-body em{color:var(--text-secondary)}

/* Quarter-of-hour tiles */
.writeup .quarters-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin:22px 0 28px;
}
.writeup .qt{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px 14px 14px;
  text-align:center;
  position:relative;
}
.writeup .qt::before{
  content:'';
  position:absolute;
  top:0; left:14px; right:14px;
  height:2px;
  border-radius:0 0 2px 2px;
  background:var(--text-muted);
}
.writeup .qt.q1::before, .writeup .qt.q3::before{background:var(--accent)}
.writeup .qt.q4::before{background:var(--amber)}
.writeup .qt-label{
  font-family:var(--font-data);
  font-size:10px;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--text-muted);
  margin-bottom:6px;
}
.writeup .qt.q1 .qt-label, .writeup .qt.q3 .qt-label{color:var(--accent)}
.writeup .qt.q4 .qt-label{color:var(--amber)}
.writeup .qt-range{
  font-family:var(--font-data);
  font-size:14px;
  color:var(--text-primary);
  font-weight:600;
  margin-bottom:8px;
  letter-spacing:0.02em;
}
.writeup .qt-role{
  font-size:12px;
  color:var(--text-secondary);
  line-height:1.5;
}
.writeup .qt-role strong{color:var(--text-primary)}

/* Compact reference tables */
.writeup table.compare{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
  margin:18px 0 22px;
  font-family:var(--font-body);
}
.writeup table.compare th, .writeup table.compare td{
  padding:12px 14px;
  border-bottom:1px solid var(--border);
  text-align:left;
  vertical-align:top;
  line-height:1.5;
}
.writeup table.compare th{
  font-family:var(--font-data);
  font-size:10px;
  font-weight:700;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--text-muted);
  background:none;
  border-bottom:1px solid var(--border-mid);
  padding-top:8px;
  padding-bottom:8px;
}
.writeup table.compare tr:last-child td{border-bottom:none}
.writeup table.compare td:first-child{
  font-family:var(--font-display);
  font-weight:600;
  color:var(--text-primary);
  white-space:nowrap;
}

/* Macro-window list */
.writeup .macro-list{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin:18px 0 22px;
}
.writeup .macro-row{
  display:flex;
  align-items:center;
  gap:14px;
  padding:10px 14px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:8px;
  font-size:13.5px;
}
.writeup .macro-row .mr-rank{
  width:24px;
  height:24px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:var(--bg-raised);
  border-radius:6px;
  color:var(--text-muted);
  font-weight:700;
  font-size:12px;
  font-family:var(--font-data);
  flex:none;
}
.writeup .macro-row.best{border-color:rgba(16,185,129,.25)}
.writeup .macro-row.best .mr-rank{background:var(--green-tint); color:var(--green)}
.writeup .macro-row.avoid{border-color:rgba(239,68,68,.25)}
.writeup .macro-row.avoid .mr-rank{background:var(--red-tint); color:var(--red)}
.writeup .macro-row .mr-time{
  font-family:var(--font-data);
  color:var(--text-primary);
  font-weight:600;
  min-width:120px;
  letter-spacing:0.02em;
}
.writeup .macro-row .mr-note{
  color:var(--text-secondary);
  font-size:13px;
}

/* Responsive */
@media (max-width: 720px){
  .hdr{padding:0 14px;height:auto;min-height:60px;flex-wrap:wrap;gap:8px;padding-top:8px;padding-bottom:8px}
  .hdr-left{gap:8px;width:100%}
  .hdr-divider{display:none}
  .hdr-select{font-size:11px;max-width:160px}
  .tab-bar{padding:0 14px}
  main{padding:24px 16px 60px}
  .split-row{grid-template-columns:1fr}
  .writeup{font-size:15px}
  .writeup h1{font-size:28px}
  .writeup h2{font-size:21px; margin-top:44px}
  .writeup .lede{font-size:16px}
  .writeup .toc ol{columns:1}
  .writeup .phase-grid{grid-template-columns:1fr}
  .writeup .quarters-grid{grid-template-columns:repeat(2,1fr)}
  .writeup .macro-row .mr-time{min-width:100px; font-size:13px}
  .writeup table.compare th, .writeup table.compare td{padding:10px 8px; font-size:12px}
}
</style>

    <div class="theme-picker" role="radiogroup" aria-label="Theme">
      <button class="theme-opt" data-theme="dark"   title="Dark"   aria-label="Dark theme">☀</button>
      <button class="theme-opt" data-theme="light"  title="Light"  aria-label="Light theme">☾</button>
      <button class="theme-opt" data-theme="gold"   title="Gold"   aria-label="Gold theme">✦</button>

<script>
(function () {
  'use strict';

  // ── Theme toggle ────────────────────────────────────────────────────────
  // Shared key with hub + Fractal Sweep dashboards.
  var THEME_KEY = 'hub-theme';
  var INSTRUMENT_KEY = 'amas-instrument';

  function currentTheme() {
    return document.documentElement.getAttribute('data-theme') || 'dark';
  }

  // ── 4-button theme picker — supports dark, light, gold, indigo ─────────
  // Wired locally rather than via Analysis/dashboard/shared.js because
  // Amas's CSS uses --bg-card / --bg-raised / --bg-hover whereas shared.css
  // uses --bg-elev-1/2/3 — keeping the JS local avoids importing shared.css
  // (which would clash with the rest of Amas's inline styles).
  function applyTheme(name) {
    if (!name) return;
    document.documentElement.setAttribute('data-theme', name);
    localStorage.setItem(THEME_KEY, name);
    document.querySelectorAll('.theme-opt').forEach(function (btn) {
      btn.classList.toggle('active', btn.dataset.theme === name);
    });
  }
  // Wire each .theme-opt button + sync the active state to whatever theme
  // the early-paint script already set on <html>.
  (function wireThemePicker() {
    var cur = currentTheme();
    document.querySelectorAll('.theme-opt').forEach(function (btn) {
      btn.addEventListener('click', function () { applyTheme(btn.dataset.theme); });
      btn.classList.toggle('active', btn.dataset.theme === cur);
    });
  })();

  // ── Recalculate button — wires to server.py /recalc?engine=amas ────────
  // Mirrors Fractal Sweep's triggerRecalc() / pollRecalc() pattern.
  function triggerRecalc() {
    var btn = document.getElementById('recalc-btn');
    if (!btn || btn.disabled) return;
    btn.disabled = true;
    btn.textContent = '⟳ Running…';
    fetch('http://localhost:8001/recalc?engine=amas', { method: 'POST' })
      .then(function (r) {
        if (r.status === 409) {
          btn.textContent = '⟳ Already running';
          setTimeout(function () { btn.textContent = '⟳ Recalculate'; btn.disabled = false; }, 2000);
          return null;
        }
        if (!r.ok) throw new Error('HTTP ' + r.status);
        btn.textContent = '⟳ Running…';
        pollRecalc();
        return null;
      })
      .catch(function () {
        btn.textContent = '⚠ Server not running';
        btn.title = 'Start server.py first: python3 server.py';
        setTimeout(function () { btn.textContent = '⟳ Recalculate'; btn.disabled = false; btn.title = ''; }, 3000);
      });
  }
  function pollRecalc() {
    var btn = document.getElementById('recalc-btn');
    var iv = setInterval(function () {
      fetch('http://localhost:8001/recalc/status?engine=amas')
        .then(function (r) { return r.json(); })
        .then(function (s) {
          if (s.status === 'ok') {
            clearInterval(iv);
            btn.textContent = '✓ Done — reloading…';
            setTimeout(function () {
              loadStats();
              btn.textContent = '⟳ Recalculate';
              btn.disabled = false;
            }, 400);
          } else if (s.status === 'error') {
            clearInterval(iv);
            btn.textContent = '⚠ Engine error';
            setTimeout(function () { btn.textContent = '⟳ Recalculate'; btn.disabled = false; }, 3000);
          }
        })
        .catch(function () {
          clearInterval(iv);
          btn.textContent = '⟳ Recalculate';
          btn.disabled = false;
        });
    }, 2000);
  }
  window.triggerRecalc = triggerRecalc;

  // ── Instrument selector (cosmetic for now; persists for Phase 3+) ───────
  var instSel = document.getElementById('instrument-select');
  var savedInst = localStorage.getItem(INSTRUMENT_KEY);
  if (savedInst === 'NQ' || savedInst === 'ES') {
    instSel.value = savedInst;
  }
  instSel.addEventListener('change', function () {
    localStorage.setItem(INSTRUMENT_KEY, instSel.value);
  });

  // ── Tab switching ───────────────────────────────────────────────────────
  var tabs = document.querySelectorAll('.tab');
  tabs.forEach(function (t) {
    t.addEventListener('click', function () {
      tabs.forEach(function (x) { x.classList.remove('active'); });
      t.classList.add('active');
      var name = t.getAttribute('data-tab');
      var panels = document.querySelectorAll('.tab-panel');
      panels.forEach(function (p) { p.classList.remove('active'); });
      var active = document.getElementById('panel-' + name);
      if (active) active.classList.add('active');
    });
  });

  // ── Helpers ─────────────────────────────────────────────────────────────
  function esc(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
  function fmtPct(p, digits) {
    if (p == null || isNaN(p)) return '—';
    return (p * 100).toFixed(digits == null ? 1 : digits) + '%';
  }
  function fmtR(r, digits) {
    if (r == null || isNaN(r)) return '—';
    var d = digits == null ? 3 : digits;
    var s = r >= 0 ? '+' : '';
    return s + r.toFixed(d) + 'R';
  }
  function fmtNum(n, digits) {
    if (n == null || isNaN(n)) return '—';
    return Number(n).toFixed(digits == null ? 2 : digits);
  }
  function truncTs(ts) {
    if (!ts) return '';
    // "2014-09-30 11:00:00-04:00" -> "2014-09-30 11:00"
    var s = String(ts);
    return s.length >= 16 ? s.slice(0, 16) : s;
  }

  // Wilson 95% CI — mirrors engine/stats.py:wilson_ci
  function wilsonCI(wins, n, z) {
    if (z == null) z = 1.96;
    if (!n || n <= 0) return [0, 1];
    var p = wins / n;
    var denom = 1 + z * z / n;
    var center = (p + z * z / (2 * n)) / denom;
    var spread = z * Math.sqrt(p * (1 - p) / n + z * z / (4 * n * n)) / denom;
    return [Math.max(0, center - spread), Math.min(1, center + spread)];
  }

  function fmtWR(wr, lo, hi, digits) {
    if (wr == null) return '—';
    var d = digits == null ? 1 : digits;
    var ciStr = (lo != null && hi != null)
      ? '[' + (lo * 100).toFixed(d) + '%, ' + (hi * 100).toFixed(d) + '%]'
      : '';
    return (wr * 100).toFixed(d) + '% <span class="ci">' + ciStr + '</span>';
  }

  // Aggregate a list of trade rows. Mirrors engine/stats.py:agg semantics
  // (excluding EXPIRED trades from WR/EV/PF, including all in N).
  function aggTrades(rows) {
    var n = rows.length;
    var resolved = rows.filter(function (r) { return r.outcome !== 'EXPIRED'; });
    var nResolved = resolved.length;
    var nExpired = n - nResolved;
    if (nResolved === 0) {
      return {
        n: n, n_resolved: 0, n_expired: nExpired,
        wins: 0, wr: null, wr_ci_low: null, wr_ci_high: null,
        ev: null, pf: null,
        draw_hits: rows.filter(function (r) { return r.draw_hit; }).length,
        draw_hit_rate: n > 0 ? rows.filter(function (r) { return r.draw_hit; }).length / n : null,
      };
    }
    var wins = resolved.filter(function (r) { return (r.r || 0) > 0; }).length;
    var wr = wins / nResolved;
    var ev = resolved.reduce(function (s, r) { return s + (r.r || 0); }, 0) / nResolved;
    var grossWin = resolved.reduce(function (s, r) { return s + Math.max(0, r.r || 0); }, 0);
    var grossLoss = resolved.reduce(function (s, r) { return s + Math.min(0, r.r || 0); }, 0);
    var pf = grossLoss < 0 ? grossWin / Math.abs(grossLoss) : null;
    var ci = wilsonCI(wins, nResolved);
    var drawHits = rows.filter(function (r) { return r.draw_hit; }).length;
    return {
      n: n, n_resolved: nResolved, n_expired: nExpired,
      wins: wins, wr: wr, wr_ci_low: ci[0], wr_ci_high: ci[1],
      ev: ev, pf: pf,
      draw_hits: drawHits,
      draw_hit_rate: n > 0 ? drawHits / n : null,
    };
  }

  // ── Data load ───────────────────────────────────────────────────────────
  function showError(msg) {
    var ph = document.getElementById('placeholder');
    var content = document.getElementById('model-content');
    content.style.display = 'none';
    ph.innerHTML =
      '<div class="error-card">' +
        '<div class="error-card-icon">⚠️</div>' +
        '<div>' +
          '<div class="error-card-title">Could not load model_stats.json</div>' +
          '<div class="error-card-body">' + msg + '</div>' +
        '</div>' +
      '</div>';
    ph.style.display = 'block';
  }

  function populateModelSelector(models) {
    var sel = document.getElementById('model-select');
    sel.innerHTML = '';
    var keys = Object.keys(models || {});

    if (keys.length === 0) {
      var opt = document.createElement('option');
      opt.disabled = true;
      opt.selected = true;
      opt.textContent = 'No models registered yet';
      sel.appendChild(opt);
      sel.disabled = true;
      return;
    }

    sel.disabled = false;
    keys.forEach(function (k, i) {
      var o = document.createElement('option');
      o.value = k;
      o.textContent = (models[k] && models[k].label) ? (k + ' — ' + models[k].label) : k;
      if (i === 0) o.selected = true;
      sel.appendChild(o);
    });
  }

  function showPlaceholder(empty) {
    var ph = document.getElementById('placeholder');
    var content = document.getElementById('model-content');
    if (empty) {
      ph.style.display = 'flex';
      content.style.display = 'none';
    } else {
      ph.style.display = 'none';
      content.style.display = 'block';
    }
  }

  // Full-screen loading overlay shown while model_stats.json is being fetched
  // and parsed. Mirrors Fractal Sweep's pattern (js/app.js:230-269). Prevents
  // a flash of the empty-state placeholder during the JSON parse.
  function injectLoadingOverlay() {
    if (document.getElementById('amas-loading')) return;
    var el = document.createElement('div');
    el.id = 'amas-loading';
    el.style.cssText =
      'position:fixed;inset:0;z-index:9999;background:var(--bg);' +
      'display:flex;align-items:center;justify-content:center;flex-direction:column;' +
      'gap:12px;font-family:var(--font-data);color:var(--text-secondary);font-size:13px;';
    el.innerHTML =
      '<div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)">Amas Models</div>' +
      '<div>Loading <code style="font-family:var(--font-data);color:var(--text-primary)">model_stats.json</code>…</div>';
    document.body.appendChild(el);
  }
  function removeLoadingOverlay() {
    var el = document.getElementById('amas-loading');
    if (el) el.remove();
  }

  function loadStats() {
    injectLoadingOverlay();
    fetch('./model_stats.json', { cache: 'no-store' })
      .then(function (res) {
        if (!res.ok) {
          throw new Error('HTTP ' + res.status);
        }
        return res.json();
      })
      .then(function (stats) {
        window.__stats = stats;
        var models = (stats && stats.models) || {};
        populateModelSelector(models);
        var keys = Object.keys(models);
        showPlaceholder(keys.length === 0);
        if (keys.length > 0) {
          renderModel(models[keys[0]]);
          var sel = document.getElementById('model-select');
          sel.addEventListener('change', function () {
            var k = sel.value;
            if (models[k]) renderModel(models[k]);
          });
        }
      })
      .catch(function (err) {
        showError(
          'has the engine run yet? Try ' +
          '<code>python3 engine/model_stats.py</code> from the ' +
          '<code>Amas Models/</code> folder.'
        );
        populateModelSelector({});
        if (window.console) console.error('[amas-dashboard] fetch failed:', err);
      })
      .finally(function () {
        removeLoadingOverlay();
      });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadStats);
  } else {
    loadStats();
  }

  // ── Per-model render dispatch ───────────────────────────────────────────
  function renderModel(model) {
    if (!model) return;
    window.__model = model;
    renderOverview(model);
    renderModelTab(model);
    renderBreakdowns(model);
    renderFilters(model);
    renderTrades(model);
    renderWalkforward(model);
    renderSpec(model);
  }

    '<h3>How Q1 ties to the H1 :42 rule</h3>',

      '<p>The same logic gives the :42 rule. A low formed at :15 of an H1 has 45 minutes of parent candle still alive, so the parent dominates and the M1 low gets defended. A low at :47 has only 13 minutes &mdash; the M1 is now the biggest thing still closing, and its level holds.</p>',

    '<h3>Why Q1 specifically makes the high or low of the hour</h3>',

  // ── Tab 1: OVERVIEW ─────────────────────────────────────────────────────
  function renderOverview(model) {
    var panel = document.getElementById('panel-overview');
    var s = model.summary || {};
    var trades = model.trades || [];

    var drawHits = trades.reduce(function (a, t) { return a + (t.draw_hit ? 1 : 0); }, 0);
    var drawRate = trades.length ? drawHits / trades.length : null;

    var longs  = trades.filter(function (t) { return t.direction === 'long'; });
    var shorts = trades.filter(function (t) { return t.direction === 'short'; });
    var lAgg = aggTrades(longs);
    var sAgg = aggTrades(shorts);

    var evClass = (s.ev != null && s.ev > 0) ? 'pos' : (s.ev != null && s.ev < 0 ? 'neg' : '');

    var expiredWarn = '';
    if (s.n && s.n_expired && (s.n_expired / s.n) > 0.05) {
      expiredWarn = '<div class="warn-chip">⚠ ' + s.n_expired +
                    ' expired trades may hide losses</div>';
    }

    var html = '';

    // ── Collapsible 5-bullet model overview (closed by default) ─────────
    html += '<details class="model-overview-details">';
    html += '<summary class="model-overview-summary">Model overview · ' + esc(model.label || '') + '</summary>';
    html += '<ul class="model-overview-list">';
    html += '<li><strong>Setup:</strong> H1 candle closes <em>outside</em> the prior H1\'s range — above prior high (long) or below prior low (short).</li>';
    html += '<li><strong>Draw:</strong> the prior H1\'s same-side extreme; mentor claim ~80% retest, this engine measures <strong>67% baseline / 76.5% on best filter combo</strong> over 12y NQ.</li>';
    html += '<li><strong>Entry:</strong> first M1 Order Block or Breaker in the post-close <code>:00–:10</code> window with a clean structural break (body ≥ 50% of range, displacement ≥ 1.0 pt).</li>';
    html += '<li><strong>Stop · TP:</strong> SL at the M1 trigger\'s invalidation level; TP at <strong>1R</strong> (<code>simple_1r</code> profile). Risk gated to ≤ 20 NQ points (= $400 at $20/pt).</li>';
    html += '<li><strong>Filters:</strong> 10 toggleable confluences — macro window, top-3 hours, no lunch, draw formed after :42, no opposite structure, no HTF rejection, aggressive body, distribution candle, within-M5 structure, NQ-ES SMT divergence.</li>';
    html += '</ul>';
    html += '</details>';

    html += '<div class="card">';
    html += '<div class="card-title">Headline · ' + esc(model.label || '') + '</div>';
    html += expiredWarn;
    html += '<div class="metric-strip">';
    html +=   tile('N Trades', String(s.n != null ? s.n : trades.length),
                   'resolved ' + (s.n_resolved != null ? s.n_resolved : '—') +
                   ' · expired ' + (s.n_expired != null ? s.n_expired : '—'));
    html +=   tile('1R Win Rate',
                   s.wr != null ? (s.wr * 100).toFixed(1) + '%' : '—',
                   s.wr_ci_low != null
                     ? '[' + (s.wr_ci_low * 100).toFixed(1) + '%, ' +
                       (s.wr_ci_high * 100).toFixed(1) + '%]'
                     : '');
    html +=   tileColored('EV', fmtR(s.ev, 3), 'mean R per resolved trade', evClass);
    html +=   tile('Profit Factor',
                   s.pf != null ? s.pf.toFixed(2) : '—',
                   'gross win R / |gross loss R|');
    html +=   tile('Avg Risk', s.avg_risk_pts != null ? s.avg_risk_pts.toFixed(2) + ' pts' : '—',
                   'avg MAE ' + (s.avg_mae_pts != null ? s.avg_mae_pts.toFixed(2) : '—') +
                   ' · MFE ' + (s.avg_mfe_pts != null ? s.avg_mfe_pts.toFixed(2) : '—'));
    html +=   tile('Draw-Hit Rate',
                   drawRate != null ? (drawRate * 100).toFixed(1) + '%' : '—',
                   drawHits + ' / ' + trades.length + ' trades');
    html += '</div>';

    html += '<div class="split-row">';
    html += '<div class="split-tile long">' +
              '<div class="split-label">Long</div>' +
              '<div class="split-value">' +
                'N=' + lAgg.n + ' · WR ' +
                (lAgg.wr != null ? (lAgg.wr * 100).toFixed(1) + '%' : '—') +
                ' · EV ' + fmtR(lAgg.ev, 3) +
              '</div>' +
            '</div>';
    html += '<div class="split-tile short">' +
              '<div class="split-label">Short</div>' +
              '<div class="split-value">' +
                'N=' + sAgg.n + ' · WR ' +
                (sAgg.wr != null ? (sAgg.wr * 100).toFixed(1) + '%' : '—') +
                ' · EV ' + fmtR(sAgg.ev, 3) +
              '</div>' +
            '</div>';
    html += '</div>';
    html += '</div>';

    html += '<div class="card">';
    html += '<div class="card-title">Equity Curve · Cumulative R</div>';
    html += '<div class="card-sub">Each resolved trade contributes its <code>r</code>; expired trades contribute 0. Trade index on the X axis.</div>';
    html += '<div class="equity-wrap" id="equity-wrap"></div>';
    html += '</div>';

    panel.innerHTML = html;

    drawEquityCurve(document.getElementById('equity-wrap'), trades);
  }

  function tile(label, value, sub) {
    return '<div class="metric-tile">' +
             '<div class="metric-label">' + esc(label) + '</div>' +
             '<div class="metric-value">' + value + '</div>' +
             (sub ? '<div class="metric-sub">' + sub + '</div>' : '') +
           '</div>';
  }
  function tileColored(label, value, sub, cls) {
    return '<div class="metric-tile">' +
             '<div class="metric-label">' + esc(label) + '</div>' +
             '<div class="metric-value ' + (cls || '') + '">' + value + '</div>' +
             (sub ? '<div class="metric-sub">' + sub + '</div>' : '') +
           '</div>';
  }

  // ── Equity curve SVG ────────────────────────────────────────────────────
  function drawEquityCurve(container, trades) {
    if (!container) return;
    if (!trades || !trades.length) {
      container.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:8px">No trades to plot.</div>';
      return;
    }

    // Build cumulative equity in R order: trade index across resolved trades only.
    // Per spec: each resolved trade contributes r, expired contributes 0.
    var sorted = trades.slice().sort(function (a, b) {
      var ta = a.anchor_ts || '', tb = b.anchor_ts || '';
      return ta < tb ? -1 : ta > tb ? 1 : 0;
    });
    var pts = [{ i: 0, eq: 0 }];
    var cum = 0;
    sorted.forEach(function (t, idx) {
      var contribute = (t.outcome === 'EXPIRED') ? 0 : (t.r || 0);
      cum += contribute;
      pts.push({ i: idx + 1, eq: cum });
    });

    var W = 760, H = 220;
    var ml = 56, mr = 32, mt = 16, mb = 30;
    var cw = W - ml - mr, ch = H - mt - mb;
    var n = pts.length;

    var ys = pts.map(function (p) { return p.eq; });
    var ymin = Math.min.apply(null, ys);
    var ymax = Math.max.apply(null, ys);
    if (ymax === ymin) { ymax = ymin + 1; }
    var pad = (ymax - ymin) * 0.1;
    var yLo = ymin - pad, yHi = ymax + pad;

    function xS(i) { return (i / Math.max(1, n - 1)) * cw; }
    function yS(v) { return ((yHi - v) / (yHi - yLo)) * ch; }

    // Line path
    var lp = '';
    for (var i = 0; i < n; i++) {
      lp += (i === 0 ? 'M' : 'L') + xS(pts[i].i).toFixed(1) + ',' + yS(pts[i].eq).toFixed(1) + ' ';
    }

    // Fill (line down to baseline at 0R)
    var yZero = yS(0);
    var fillP = 'M' + xS(pts[0].i).toFixed(1) + ',' + yZero.toFixed(1) + ' ';
    for (var j = 0; j < n; j++) {
      fillP += 'L' + xS(pts[j].i).toFixed(1) + ',' + yS(pts[j].eq).toFixed(1) + ' ';
    }
    fillP += 'L' + xS(pts[n - 1].i).toFixed(1) + ',' + yZero.toFixed(1) + ' Z';

    // Y ticks: ~5 evenly spaced, integer-friendly
    function niceStep(range) {
      var raw = range / 5;
      var mag = Math.pow(10, Math.floor(Math.log10(Math.max(raw, 1e-9))));
      var r = raw / mag;
      var step = r < 1.5 ? 1 : r < 3 ? 2 : r < 7 ? 5 : 10;
      return step * mag;
    }
    var step = niceStep(yHi - yLo);
    var grid = '', yl = '';
    var t0 = Math.ceil(yLo / step) * step;
    for (var t = t0; t <= yHi + 1e-6; t += step) {
      var y = yS(t);
      var isZero = Math.abs(t) < step * 0.0001;
      grid += '<line x1="0" y1="' + y.toFixed(1) + '" x2="' + cw + '" y2="' + y.toFixed(1) +
              '" stroke="var(--border)" stroke-width="' + (isZero ? '1.2' : '1') +
              '" stroke-dasharray="' + (isZero ? '4,3' : '2,4') +
              '" opacity="' + (isZero ? '0.9' : '0.5') + '"/>';
      yl += '<text x="-8" y="' + (y + 4).toFixed(1) +
            '" text-anchor="end" font-size="10" fill="var(--text-muted)" ' +
            'font-family="var(--font-data)">' + t.toFixed(0) + 'R</text>';
    }

    // X ticks: 0, mid, end
    var xticks = '';
    [0, Math.floor((n - 1) / 2), n - 1].forEach(function (idx) {
      var p = pts[idx];
      var xv = xS(p.i);
      xticks += '<text x="' + xv.toFixed(1) + '" y="' + (ch + 18) + '" text-anchor="middle" ' +
                'font-size="10" fill="var(--text-muted)" font-family="var(--font-data)">#' + p.i + '</text>';
    });

    // Endpoint labels: start (0R) and end value
    var startEq = pts[0].eq, endEq = pts[n - 1].eq;
    var endX = xS(pts[n - 1].i), endY = yS(endEq);
    var lblColor = endEq >= 0 ? 'var(--green)' : 'var(--red)';
    var endLbl =
      '<circle cx="' + endX.toFixed(1) + '" cy="' + endY.toFixed(1) +
      '" r="3.5" fill="' + lblColor + '"/>' +
      '<text x="' + (endX - 6).toFixed(1) + '" y="' + (endY - 8).toFixed(1) +
      '" text-anchor="end" font-size="11" font-weight="700" ' +
      'fill="' + lblColor + '" font-family="var(--font-data)">' +
      (endEq >= 0 ? '+' : '') + endEq.toFixed(1) + 'R</text>';
    var startLbl =
      '<circle cx="' + xS(pts[0].i).toFixed(1) + '" cy="' + yS(startEq).toFixed(1) +
      '" r="3" fill="var(--text-muted)"/>' +
      '<text x="' + (xS(pts[0].i) + 6).toFixed(1) + '" y="' + (yS(startEq) - 6).toFixed(1) +
      '" text-anchor="start" font-size="10" fill="var(--text-muted)" ' +
      'font-family="var(--font-data)">0R</text>';

    var fillColor = endEq >= 0 ? 'var(--green)' : 'var(--red)';

    var svg =
      '<svg class="equity-svg" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Equity curve">' +
        '<g transform="translate(' + ml + ',' + mt + ')">' +
          grid +
          '<path d="' + fillP + '" fill="' + fillColor + '" fill-opacity="0.10"/>' +
          '<path d="' + lp.trim() + '" fill="none" stroke="var(--accent)" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>' +
          startLbl +
          endLbl +
          yl +
          xticks +
        '</g>' +
      '</svg>';

    container.innerHTML = svg;
  }

  // ── Tab 2: BREAKDOWNS ───────────────────────────────────────────────────
  function renderBreakdowns(model) {
    var panel = document.getElementById('panel-breakdowns');
    var trades = model.trades || [];

    var byYear = {};
    var byDir  = {};
    var byPat  = {};

    trades.forEach(function (t) {
      var y = (t.anchor_ts || '').slice(0, 4);
      (byYear[y]  = byYear[y]  || []).push(t);
      (byDir[t.direction]     = byDir[t.direction]     || []).push(t);
      (byPat[t.entry_pattern] = byPat[t.entry_pattern] || []).push(t);
    });

    function rowsFromGroups(groups, sortFn) {
      var keys = Object.keys(groups).sort(sortFn);
      return keys.map(function (k) {
        var rows = groups[k];
        var a = aggTrades(rows);
        return { key: k, agg: a };
      });
    }

    function tableHTML(title, sub, rows, keyHeader) {
      var html = '';
      html += '<div class="card">';
      html += '<div class="card-title">' + esc(title) + '</div>';
      if (sub) html += '<div class="card-sub">' + sub + '</div>';
      html += '<div class="tbl-wrap"><table class="tbl"><thead><tr>';
      html += '<th>' + esc(keyHeader) + '</th>';
      html += '<th>N</th>';
      html += '<th>Resolved</th>';
      html += '<th>1R-WR</th>';
      html += '<th>Draw-Hit</th>';
      html += '<th>EV (R)</th>';
      html += '<th>PF</th>';
      html += '</tr></thead><tbody>';

      rows.forEach(function (r) {
        var a = r.agg;
        var lowN = a.n_resolved < 30
          ? '<span class="lowN" title="N < 30 — interpret with care">⚠</span>' : '';
        var wrCell = a.wr != null
          ? (a.wr * 100).toFixed(1) + '% <span class="ci">[' +
            (a.wr_ci_low * 100).toFixed(1) + '%, ' +
            (a.wr_ci_high * 100).toFixed(1) + '%]</span>'
          : '—';
        html += '<tr>' +
                  '<td>' + esc(r.key || '—') + lowN + '</td>' +
                  '<td>' + a.n + '</td>' +
                  '<td>' + a.n_resolved + '</td>' +
                  '<td>' + wrCell + '</td>' +
                  '<td>' + (a.draw_hit_rate != null ? (a.draw_hit_rate * 100).toFixed(1) + '%' : '—') + '</td>' +
                  '<td>' + (a.ev != null ? fmtR(a.ev, 3) : '—') + '</td>' +
                  '<td>' + (a.pf != null ? a.pf.toFixed(2) : '—') + '</td>' +
                '</tr>';
      });

      html += '</tbody></table></div></div>';
      return html;
    }

    var html = '';
    html += tableHTML('By Year', 'Year-by-year stability check.',
                     rowsFromGroups(byYear, function (a, b) { return a < b ? -1 : 1; }),
                     'Year');
    html += tableHTML('By Direction', 'Long vs short.',
                     rowsFromGroups(byDir, function (a, b) { return a < b ? -1 : 1; }),
                     'Direction');
    html += tableHTML('By Entry Pattern', 'Entry mechanic distribution.',
                     rowsFromGroups(byPat, function (a, b) { return a < b ? -1 : 1; }),
                     'Pattern');

    panel.innerHTML = html;
  }

  // ── Tab 3: FILTERS ──────────────────────────────────────────────────────
  // Pass-flag mapping: filter key → trade row field.
  function passField(key) { return 'passes_' + key; }

  // Compute draw-hit rate client-side for trades passing all selected filters.
  function drawHitForCombo(trades, comboKeys) {
    var matched = trades;
    for (var i = 0; i < comboKeys.length; i++) {
      var f = passField(comboKeys[i]);
      matched = matched.filter(function (t) { return t[f] === true; });
    }
    if (!matched.length) return null;
    var hits = matched.reduce(function (a, t) { return a + (t.draw_hit ? 1 : 0); }, 0);
    return hits / matched.length;
  }

  var filtersState = {
    sortKey: 'ev',
    sortDir: 'desc',
    rows: [],
    // Sprint 3 — chip bar runtime toggle state. Keys = filter keys, value =
    // bool (active). Persists per page-load (not localStorage). Recomputes
    // the live summary card on every toggle.
    activeChips: new Set(),
    // The full trades list for the currently-rendered model; aggTrades()
    // calls re-filter from this each time a chip flips.
    activeTrades: [],
    // The full filter-key list for the currently-rendered model; used so
    // the chip bar can render even when activeChips is empty.
    allKeys: [],
  };

  // Toggle a filter chip. Re-renders the chip bar (to refresh deltas) and
  // the summary card. Does NOT re-render the static variants table — that
  // stays as the precomputed reference.
  function toggleFilterChip(key) {
    if (filtersState.activeChips.has(key)) {
      filtersState.activeChips.delete(key);
    } else {
      filtersState.activeChips.add(key);
    }
    renderFilterChipBar();
    renderFilterLiveSummary();
  }

  // Build the chip bar DOM. Each chip shows the filter label, an N badge
  // (live N after applying all currently-active chips PLUS the chip's own
  // hypothetical state), and a WR delta vs baseline. Active state styles
  // the chip as the green pill.
  function renderFilterChipBar() {
    var bar = document.getElementById('filter-chip-bar');
    if (!bar) return;
    var trades = filtersState.activeTrades;
    var keys = filtersState.allKeys;
    var active = filtersState.activeChips;
    var baseline = aggTrades(trades);

    bar.innerHTML = '';
    keys.forEach(function (k) {
      // Compute the stats *if this chip were toggled* — i.e. the current
      // active set XOR k. Lets the badge preview the impact of clicking.
      var probe = new Set(active);
      if (probe.has(k)) probe.delete(k); else probe.add(k);
      var filtered = trades;
      probe.forEach(function (pk) {
        var f = passField(pk);
        filtered = filtered.filter(function (t) { return t[f] === true; });
      });
      var s = aggTrades(filtered);
      var wrDelta = (s.wr != null && baseline.wr != null)
        ? ((s.wr - baseline.wr) * 100) : null;
      var deltaStr = wrDelta != null
        ? (wrDelta >= 0 ? '+' : '') + wrDelta.toFixed(1) + '%'
        : '—';
      var deltaCls = wrDelta != null && wrDelta < 0 ? 'neg' : '';

      var chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'chip' + (active.has(k) ? ' active' : '');
      chip.dataset.filterKey = k;
      chip.innerHTML =
        esc(k) +
        '<span class="chip-delta ' + deltaCls + '">' +
          'n=' + s.n + ' · WR ' + deltaStr +
        '</span>';
      chip.addEventListener('click', function () { toggleFilterChip(k); });
      bar.appendChild(chip);
    });
  }

  // Render the "Live Subset" stat card: N / WR / EV / PF for the trades
  // passing all currently-active chips, with deltas vs the no-filter baseline.
  function renderFilterLiveSummary() {
    var card = document.getElementById('filter-live-summary');
    if (!card) return;
    var trades = filtersState.activeTrades;
    var active = filtersState.activeChips;
    var baseline = aggTrades(trades);
    var filtered = trades;
    active.forEach(function (k) {
      var f = passField(k);
      filtered = filtered.filter(function (t) { return t[f] === true; });
    });
    var s = aggTrades(filtered);

    function pct(x) { return x != null ? (x * 100).toFixed(1) + '%' : '—'; }
    function r(x) { return x != null ? (x >= 0 ? '+' : '') + x.toFixed(3) + 'R' : '—'; }
    function delta(cur, base, fmt) {
      if (cur == null || base == null) return '';
      var d = cur - base;
      var sign = d >= 0 ? '+' : '';
      return ' (' + sign + fmt(d) + ')';
    }
    function deltaCls(cur, base) {
      if (cur == null || base == null) return '';
      return (cur - base) >= 0 ? 'pos' : 'neg';
    }

    var dropped = baseline.n - s.n;
    card.innerHTML =
      '<div><span class="lbl">Active filters</span>' +
        '<span class="val">' + (active.size === 0 ? 'None (baseline)' : Array.from(active).join(' + ')) + '</span></div>' +
      '<div><span class="lbl">N</span><span class="val">' + s.n + ' / ' + baseline.n +
        ' (' + (dropped > 0 ? '−' + dropped : '0') + ')</span></div>' +
      '<div><span class="lbl">WR</span>' +
        '<span class="val ' + deltaCls(s.wr, baseline.wr) + '">' +
          pct(s.wr) + delta(s.wr, baseline.wr, function (d) { return (d * 100).toFixed(1) + '%'; }) +
        '</span></div>' +
      '<div><span class="lbl">EV</span>' +
        '<span class="val ' + deltaCls(s.ev, baseline.ev) + '">' +
          r(s.ev) + delta(s.ev, baseline.ev, function (d) { return d.toFixed(3) + 'R'; }) +
        '</span></div>' +
      '<div><span class="lbl">PF</span>' +
        '<span class="val ' + deltaCls(s.pf, baseline.pf) + '">' +
          (s.pf != null ? s.pf.toFixed(2) : '—') +
          (s.pf != null && baseline.pf != null
            ? ' (' + ((s.pf - baseline.pf) >= 0 ? '+' : '') + (s.pf - baseline.pf).toFixed(2) + ')'
            : '') +
        '</span></div>';
  }

  function renderFilters(model) {
    var panel = document.getElementById('panel-filters');
    var variants = model.filter_variants || [];
    var trades = model.trades || [];

    // Sprint 3: reset chip state for the new model. allKeys ordered by the
    // filter spec so chip layout matches the model's intent.
    filtersState.activeChips = new Set();
    filtersState.activeTrades = trades;
    filtersState.allKeys = (model.filters || []).map(function (f) { return f.key; });

    // Pre-build display rows. Includes the empty (Baseline) combo.
    var rows = variants.map(function (v) {
      var combo = (v.filters || []).slice().sort(); // alphabetical
      var key = combo.join('+');
      var isBaseline = combo.length === 0;
      var s = v.stats || {};
      var drawRate = drawHitForCombo(trades, combo);
      return {
        combo: combo,
        comboLabel: isBaseline ? 'Baseline' : combo.join(' + '),
        isBaseline: isBaseline,
        n: s.n || 0,
        n_resolved: s.n_resolved || 0,
        wr: s.wr,
        wr_ci_low: s.wr_ci_low,
        wr_ci_high: s.wr_ci_high,
        ev: s.ev,
        pf: s.pf,
        drawRate: drawRate,
      };
    });

    // Identify "Best": top non-baseline by EV (where EV is defined).
    var bestEv = -Infinity, bestKey = null;
    rows.forEach(function (r) {
      if (!r.isBaseline && r.ev != null && r.ev > bestEv) {
        bestEv = r.ev;
        bestKey = r.combo.join('+');
      }
    });
    rows.forEach(function (r) {
      r.isBest = !r.isBaseline && r.combo.join('+') === bestKey;
    });

    filtersState.rows = rows;

    panel.innerHTML =
      // Sprint 3 — runtime chip bar above the static variants table. Each
      // chip toggles AND-style; the live summary card shows the resulting
      // N/WR/EV/PF with delta vs the no-filter baseline.
      '<div class="card">' +
        '<div class="card-title">Live Filter Toggles</div>' +
        '<div class="card-sub">' +
          'Click a chip to add/remove that filter from the live subset. ' +
          'Each chip preview shows the resulting N and the WR delta if you toggle it. ' +
          'Filters combine with AND semantics. The summary card below shows live stats.' +
        '</div>' +
        '<div class="chip-bar" id="filter-chip-bar"></div>' +
        '<div class="chip-summary" id="filter-live-summary"></div>' +
      '</div>' +
      '<div class="card">' +
        '<div class="card-title">All Variants (precomputed)</div>' +
        '<div class="card-sub">' +
          'All ' + variants.length + ' filter combinations precomputed by the engine. ' +
          'Click a column header to sort. Baseline = no filters; Best = highest EV non-baseline combo. ' +
          'Cells with N&lt;30 are flagged.' +
        '</div>' +
        '<div class="tbl-wrap tbl-scroll">' +
          '<table class="tbl" id="filters-tbl">' +
            '<thead><tr id="filters-head"></tr></thead>' +
            '<tbody id="filters-body"></tbody>' +
          '</table>' +
        '</div>' +
      '</div>';

    // Wire the chip bar + summary card after the DOM is in place.
    renderFilterChipBar();
    renderFilterLiveSummary();

    var headEl = document.getElementById('filters-head');
    var cols = [
      { k: 'combo',     label: 'Filter Combo' },
      { k: 'n',         label: 'N' },
      { k: 'wr',        label: '1R-WR' },
      { k: 'ev',        label: 'EV (R)' },
      { k: 'pf',        label: 'PF' },
      { k: 'drawRate',  label: 'Draw-Hit' },
    ];
    cols.forEach(function (c) {
      var th = document.createElement('th');
      th.className = 'sortable';
      th.dataset.sortKey = c.k;
      th.innerHTML = esc(c.label) + '<span class="sort-arrow">▼</span>';
      th.addEventListener('click', function () {
        if (filtersState.sortKey === c.k) {
          filtersState.sortDir = filtersState.sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          filtersState.sortKey = c.k;
          filtersState.sortDir = c.k === 'combo' ? 'asc' : 'desc';
        }
        renderFiltersBody();
      });
      headEl.appendChild(th);
    });

    renderFiltersBody();
  }

  function renderFiltersBody() {
    var rows = filtersState.rows.slice();
    var key = filtersState.sortKey;
    var dir = filtersState.sortDir;
    rows.sort(function (a, b) {
      var av, bv;
      if (key === 'combo') { av = a.comboLabel; bv = b.comboLabel; }
      else { av = a[key]; bv = b[key]; }
      // null values → sort last
      var aNull = av == null || (typeof av === 'number' && isNaN(av));
      var bNull = bv == null || (typeof bv === 'number' && isNaN(bv));
      if (aNull && bNull) return 0;
      if (aNull) return 1;
      if (bNull) return -1;
      if (av < bv) return dir === 'asc' ? -1 : 1;
      if (av > bv) return dir === 'asc' ? 1 : -1;
      return 0;
    });

    // Update sort arrows
    var ths = document.querySelectorAll('#filters-head th');
    ths.forEach(function (th) {
      th.classList.remove('sort-asc', 'sort-desc');
      var arr = th.querySelector('.sort-arrow');
      if (th.dataset.sortKey === key) {
        th.classList.add(dir === 'asc' ? 'sort-asc' : 'sort-desc');
        if (arr) arr.textContent = dir === 'asc' ? '▲' : '▼';
      } else if (arr) {
        arr.textContent = '▼';
      }
    });

    var frag = document.createDocumentFragment();
    rows.forEach(function (r) {
      var tr = document.createElement('tr');
      if (r.isBaseline) tr.className = 'row-baseline';
      else if (r.isBest) tr.className = 'row-best';

      var lowN = (r.n_resolved < 30 && !r.isBaseline)
        ? '<span class="lowN" title="N < 30 — interpret with care">⚠</span>' : '';
      var tag = r.isBaseline
        ? '<span class="tag tag-baseline">Baseline</span>'
        : (r.isBest ? '<span class="tag tag-best">Best</span>' : '');

      var wrCell = r.wr != null
        ? (r.wr * 100).toFixed(1) + '% <span class="ci">[' +
          (r.wr_ci_low * 100).toFixed(1) + '%, ' +
          (r.wr_ci_high * 100).toFixed(1) + '%]</span>'
        : '—';

      tr.innerHTML =
        '<td>' + esc(r.comboLabel) + tag + '</td>' +
        '<td>' + r.n + lowN + '</td>' +
        '<td>' + wrCell + '</td>' +
        '<td>' + (r.ev != null ? fmtR(r.ev, 3) : '—') + '</td>' +
        '<td>' + (r.pf != null ? r.pf.toFixed(2) : '—') + '</td>' +
        '<td>' + (r.drawRate != null ? (r.drawRate * 100).toFixed(1) + '%' : '—') + '</td>';
      frag.appendChild(tr);
    });
    var body = document.getElementById('filters-body');
    body.innerHTML = '';
    body.appendChild(frag);
  }

  // ── Tab 4: TRADES ───────────────────────────────────────────────────────
  var tradesState = {
    sortKey: 'anchor_ts',
    sortDir: 'asc',
    page: 0,
    pageSize: 100,
    rows: [],
  };

  function renderTrades(model) {
    var panel = document.getElementById('panel-trades');
    var trades = (model.trades || []).slice();
    tradesState.rows = trades;
    tradesState.page = 0;

    panel.innerHTML =
      '<div class="card">' +
        '<div class="card-title">All Trades · ' + trades.length + '</div>' +
        '<div class="card-sub">Click a column header to sort. Showing 100 rows per page.</div>' +
        '<div class="tbl-wrap">' +
          '<table class="tbl" id="trades-tbl">' +
            '<thead><tr id="trades-head"></tr></thead>' +
            '<tbody id="trades-body"></tbody>' +
          '</table>' +
        '</div>' +
        '<div class="pager">' +
          '<button class="pager-btn" id="trades-prev" type="button">‹ Prev</button>' +
          '<button class="pager-btn" id="trades-next" type="button">Next ›</button>' +
          '<span class="pager-info" id="trades-info"></span>' +
        '</div>' +
      '</div>';

    var cols = [
      { k: 'anchor_ts',      label: 'Anchor TS' },
      { k: 'entry_ts',       label: 'Entry TS' },
      { k: 'resolution_ts',  label: 'Exit TS' },
      { k: 'direction',      label: 'Dir' },
      { k: 'entry_pattern',  label: 'Pattern' },
      { k: 'entry_price',    label: 'Entry' },
      { k: 'sl_price',       label: 'SL' },
      { k: 'tp_price',       label: 'TP' },
      { k: 'risk_pts',       label: 'Risk Pts' },
      { k: 'outcome',        label: 'Outcome' },
      { k: 'r',              label: 'R' },
      { k: 'mae_pts',        label: 'MAE' },
      { k: 'mfe_pts',        label: 'MFE' },
      { k: 'draw_hit',       label: 'Draw' },
    ];
    var headEl = document.getElementById('trades-head');
    cols.forEach(function (c) {
      var th = document.createElement('th');
      th.className = 'sortable';
      th.dataset.sortKey = c.k;
      th.innerHTML = esc(c.label) + '<span class="sort-arrow">▼</span>';
      th.addEventListener('click', function () {
        if (tradesState.sortKey === c.k) {
          tradesState.sortDir = tradesState.sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          tradesState.sortKey = c.k;
          tradesState.sortDir = c.k === 'anchor_ts' ? 'asc' : 'desc';

    document.getElementById('trades-prev').addEventListener('click', function () {

    document.getElementById('trades-next').addEventListener('click', function () {
      var total = tradesState.rows.length;

      if (tradesState.page < maxPage) {
        tradesState.page++;
