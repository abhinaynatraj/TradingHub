<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Amas Models · Probability Engine</title>
<script>
  // Early-paint theme: read shared hub-theme key BEFORE any pixels render.
  // Avoids a flash of wrong theme on load.
  (function () {
    var theme = localStorage.getItem('hub-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#10b981;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;--purple:#8b5cf6;--cyan:#06b6d4;
  --font-display:'Plus Jakarta Sans',system-ui,sans-serif;
  --font-data:'IBM Plex Mono','DM Mono','Fira Code',monospace;
  --font-body:'Inter',system-ui,sans-serif;
  --ease:cubic-bezier(0.16,1,0.3,1);
}
/* CSS variable names mirror Fractal Sweep's dashboard so future migrations are easy. */
[data-theme="dark"]{
  --bg:#0a0e17;--bg-card:#111827;--bg-raised:#1a2235;--bg-hover:#1e2d42;
  --border:#1e2d42;--border-mid:#243447;--border-hi:#2e4460;
  --text-primary:#e2eaf4;--text-secondary:#8ba4bc;--text-muted:#4a6480;--text-faint:#2a3f55;
  --shadow:0 1px 3px rgba(0,0,0,.5),0 4px 16px rgba(0,0,0,.3);
  --shadow-lg:0 8px 32px rgba(0,0,0,.5);
  --green-tint:rgba(16,185,129,.1);--green-border:rgba(16,185,129,.25);
  --red-tint:rgba(239,68,68,.1);--red-border:rgba(239,68,68,.25);
  --amber-tint:rgba(245,158,11,.1);--amber-border:rgba(245,158,11,.25);
  --accent:#06b6d4; /* cyan to distinguish Amas from Fractal Sweep's green, but same family */
  --accent-glow:0 0 24px rgba(6,182,212,.18);
  --glass-bg:rgba(17,24,39,.55);
  --glass-bg-strong:rgba(26,34,53,.7);
  --glass-border:rgba(255,255,255,.06);
  --glass-border-hi:rgba(255,255,255,.1);
  --glass-blur:saturate(160%) blur(18px);
}
[data-theme="light"]{
  --bg:#f8fafc;--bg-card:#ffffff;--bg-raised:#f1f5f9;--bg-hover:#e2e8f0;
  --border:#e2e8f0;--border-mid:#cbd5e1;--border-hi:#94a3b8;
  --text-primary:#0f172a;--text-secondary:#334155;--text-muted:#64748b;--text-faint:#94a3b8;
  --shadow:0 1px 3px rgba(15,23,42,.06),0 4px 12px rgba(15,23,42,.04);
  --shadow-lg:0 8px 32px rgba(15,23,42,.1);
  --green-tint:rgba(16,185,129,.1);--green-border:rgba(16,185,129,.35);
  --red-tint:rgba(239,68,68,.1);--red-border:rgba(239,68,68,.35);
  --amber-tint:rgba(245,158,11,.12);--amber-border:rgba(245,158,11,.35);
  --accent:#0891b2;
  --accent-glow:0 0 24px rgba(8,145,178,.1);
  --glass-bg:rgba(255,255,255,.65);
  --glass-bg-strong:rgba(255,255,255,.85);
  --glass-border:rgba(15,23,42,.08);
  --glass-border-hi:rgba(15,23,42,.14);
  --glass-blur:saturate(180%) blur(20px);
}

html,body{
  background:var(--bg);
  color:var(--text-primary);
  font-family:var(--font-body);
  font-size:14px;
  line-height:1.6;
  min-height:100vh;
  overflow-x:hidden;
  transition:background .25s var(--ease),color .25s var(--ease);
}

/* ── HEADER ─────────────────────────────────────────────────────────────── */
.hdr{
  background:var(--glass-bg);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border-bottom:1px solid var(--glass-border);
  padding:0 28px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:var(--shadow);
}
@supports not (backdrop-filter:blur(10px)){.hdr{background:var(--bg-card)}}

.hdr-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.hdr-right{display:flex;align-items:center;gap:10px}

.hub-back{
  display:flex;align-items:center;gap:6px;
  text-decoration:none;
  padding:6px 10px;
  border-radius:8px;
  color:var(--text-muted);
  font-size:13px;
  transition:background .15s,color .15s;
}
.hub-back:hover{background:var(--bg-raised);color:var(--text-primary)}
.hub-back-glyph{font-size:14px;line-height:1}

.hdr-wordmark{
  font-family:var(--font-display);
  font-size:18px;
  font-weight:800;
  letter-spacing:-0.02em;
  color:var(--text-primary);
  line-height:1;
}
.hdr-wordmark em{color:var(--accent);font-style:normal}

.hdr-divider{width:1px;height:24px;background:var(--border-mid)}

.hdr-select{
  font-family:var(--font-data);
  font-size:11px;
  font-weight:500;
  letter-spacing:0.04em;
  padding:6px 28px 6px 12px;
  border-radius:8px;
  border:1px solid var(--border-mid);
  background:var(--bg-raised);
  color:var(--text-secondary);
  cursor:pointer;
  appearance:none;
  -webkit-appearance:none;
  background-image:linear-gradient(45deg,transparent 50%,var(--text-muted) 50%),linear-gradient(135deg,var(--text-muted) 50%,transparent 50%);
  background-position:right 12px top 50%,right 8px top 50%;
  background-size:4px 4px,4px 4px;
  background-repeat:no-repeat;
  transition:border-color .15s,color .15s,background-color .15s;
  max-width:280px;
}
.hdr-select:hover{border-color:var(--border-hi);color:var(--text-primary)}
.hdr-select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--green-tint)}
.hdr-select:disabled{opacity:.6;cursor:not-allowed}

.hdr-select-label{
  font-family:var(--font-data);
  font-size:10px;
  letter-spacing:0.08em;
  color:var(--text-muted);
  text-transform:uppercase;
  margin-right:-6px;
}

.theme-btn{
  background:var(--bg-raised);
  border:1px solid var(--border-mid);
  border-radius:8px;
  color:var(--text-secondary);
  cursor:pointer;
  font-size:14px;
  width:36px;
  height:32px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  transition:all .15s var(--ease);
}
.theme-btn:hover{background:var(--bg-hover);color:var(--text-primary);border-color:var(--border-hi)}

/* ── TAB BAR ────────────────────────────────────────────────────────────── */
.tab-bar{
  background:var(--bg-card);
  border-bottom:1px solid var(--border);
  padding:0 28px;
  display:flex;
  gap:2px;
  overflow-x:auto;
  position:sticky;
  top:60px;
  z-index:90;
}
.tab{
  font-family:var(--font-body);
  font-size:13px;
  font-weight:500;
  padding:14px 18px 13px;
  color:var(--text-muted);
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;
  white-space:nowrap;
  user-select:none;
  background:none;
  border-left:none;
  border-right:none;
  border-top:none;
}
.tab:hover{color:var(--text-secondary)}
.tab.active{color:var(--text-primary);border-bottom-color:var(--accent)}

/* ── MAIN ───────────────────────────────────────────────────────────────── */
main{
  max-width:1400px;
  margin:0 auto;
  padding:32px 28px 80px;
}

.placeholder{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  min-height:50vh;
  padding:48px 24px;
}
.placeholder-icon{
  font-size:42px;
  margin-bottom:18px;
  opacity:.4;
}
.placeholder-title{
  font-family:var(--font-display);
  font-size:18px;
  font-weight:700;
  color:var(--text-primary);
  margin-bottom:10px;
  letter-spacing:-0.01em;
}
.placeholder-body{
  font-size:13.5px;
  color:var(--text-secondary);
  max-width:520px;
  line-height:1.65;
  margin-bottom:6px;
}
.placeholder-body code{
  font-family:var(--font-data);
  font-size:12px;
  background:var(--bg-raised);
  border:1px solid var(--border);
  padding:1px 6px;
  border-radius:4px;
  color:var(--text-primary);
}

.error-card{
  max-width:560px;
  margin:60px auto;
  padding:20px 24px;
  background:var(--red-tint);
  border:1px solid var(--red-border);
  border-radius:12px;
  display:flex;
  gap:14px;
  align-items:flex-start;
}
.error-card-icon{font-size:20px;line-height:1.4;flex-shrink:0}
.error-card-title{
  font-weight:700;
  color:var(--red);
  margin-bottom:4px;
  font-size:13px;
}
.error-card-body{
  color:var(--text-secondary);
  font-size:13px;
  line-height:1.55;
}
.error-card-body code{
  font-family:var(--font-data);
  font-size:12px;
  background:var(--bg-raised);
  border:1px solid var(--border-mid);
  padding:1px 6px;
  border-radius:4px;
  color:var(--text-primary);
}

#model-content{display:none}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── PANEL / CARD STYLING ───────────────────────────────────────────────── */
.card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px 22px;
  margin-bottom:18px;
  box-shadow:var(--shadow);
}
.card-title{
  font-family:var(--font-display);
  font-size:13px;
  font-weight:700;
  letter-spacing:0.04em;
  text-transform:uppercase;
  color:var(--text-secondary);
  margin-bottom:14px;
}
.card-sub{
  font-size:12px;
  color:var(--text-muted);
  margin-bottom:12px;
}

/* Headline strip / metric tiles */
.metric-strip{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:12px;
  margin-bottom:18px;
}
.metric-tile{
  background:var(--bg-raised);
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px 16px;
  display:flex;
  flex-direction:column;
  gap:4px;
}
.metric-label{
  font-family:var(--font-data);
  font-size:10px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--text-muted);
}
.metric-value{
  font-family:var(--font-data);
  font-size:20px;
  font-weight:600;
  color:var(--text-primary);
  letter-spacing:-0.01em;
}
.metric-sub{
  font-family:var(--font-data);
  font-size:11px;
  color:var(--text-muted);
}
.metric-value.pos{color:var(--green)}
.metric-value.neg{color:var(--red)}

.warn-chip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 12px;
  background:var(--amber-tint);
  border:1px solid var(--amber-border);
  border-radius:999px;
  color:var(--amber);
  font-size:12px;
  font-weight:600;
  margin-bottom:12px;
}

.split-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:18px;
}
.split-tile{
  background:var(--bg-raised);
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px 16px;
}
.split-tile.long{border-left:3px solid var(--green)}
.split-tile.short{border-left:3px solid var(--red)}
.split-label{
  font-family:var(--font-data);
  font-size:10px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--text-muted);
  margin-bottom:4px;
}
.split-value{
  font-family:var(--font-data);
  font-size:16px;
  color:var(--text-primary);
}

/* Tables */
.tbl-wrap{
  overflow-x:auto;
  border:1px solid var(--border);
  border-radius:10px;
  background:var(--bg-card);
}
.tbl{
  width:100%;
  border-collapse:collapse;
  font-family:var(--font-data);
  font-size:12px;
}
.tbl th, .tbl td{
  padding:10px 12px;
  text-align:right;
  border-bottom:1px solid var(--border);
  white-space:nowrap;
}
.tbl th:first-child, .tbl td:first-child{text-align:left}
.tbl thead th{
  background:var(--bg-raised);
  color:var(--text-secondary);
  font-weight:600;
  font-size:11px;
  letter-spacing:0.04em;
  text-transform:uppercase;
  position:sticky;
  top:0;
  cursor:pointer;
  user-select:none;
}
.tbl thead th.sortable:hover{color:var(--text-primary);background:var(--bg-hover)}
.tbl thead th .sort-arrow{
  display:inline-block;
  margin-left:4px;
  opacity:.4;
  font-size:9px;
}
.tbl thead th.sort-asc .sort-arrow,
.tbl thead th.sort-desc .sort-arrow{opacity:1;color:var(--accent)}
.tbl tbody tr:hover{background:var(--bg-hover)}
.tbl tbody tr:last-child td{border-bottom:none}

.tbl .ci{
  display:block;
  font-size:10.5px;
  color:var(--text-muted);
  margin-top:1px;
}
.tbl .lowN{color:var(--amber);margin-left:4px}

.long-cell{color:var(--green)}
.short-cell{color:var(--red)}
.tp-cell{color:var(--green)}
.sl-cell{color:var(--red)}
.exp-cell{color:var(--amber)}

.tbl-scroll{
  max-height:680px;
  overflow-y:auto;
}

/* Filters tab specifics */
.row-baseline td{background:var(--bg-raised);font-weight:600}
.row-best td{background:var(--green-tint)}
.tag{
  display:inline-block;
  padding:1px 7px;
  border-radius:999px;
  font-size:10px;
  font-weight:600;
  letter-spacing:0.05em;
  text-transform:uppercase;
  margin-left:6px;
}
.tag-baseline{background:var(--bg-hover);color:var(--text-secondary);border:1px solid var(--border-mid)}
.tag-best{background:var(--green-tint);color:var(--green);border:1px solid var(--green-border)}

/* Pagination */
.pager{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 4px 0;
  font-family:var(--font-data);
  font-size:12px;
  color:var(--text-muted);
}
.pager-btn{
  font-family:var(--font-data);
  font-size:12px;
  padding:6px 12px;
  border-radius:6px;
  border:1px solid var(--border-mid);
  background:var(--bg-raised);
  color:var(--text-secondary);
  cursor:pointer;
  transition:all .15s var(--ease);
}
.pager-btn:hover:not(:disabled){background:var(--bg-hover);color:var(--text-primary);border-color:var(--border-hi)}
.pager-btn:disabled{opacity:.4;cursor:not-allowed}
.pager-info{margin-left:auto}

/* Equity curve */
.equity-wrap{
  background:var(--bg-raised);
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px 16px;
}
.equity-svg{display:block;width:100%;max-width:100%;height:auto}

footer{
  text-align:center;
  padding:24px;
  font-size:11px;
  color:var(--text-muted);
  border-top:1px solid var(--border);
  font-family:var(--font-data);
  letter-spacing:0.02em;
}

/* Responsive */
@media (max-width: 720px){
  .hdr{padding:0 14px;height:auto;min-height:60px;flex-wrap:wrap;gap:8px;padding-top:8px;padding-bottom:8px}
  .hdr-left{gap:8px;width:100%}
  .hdr-divider{display:none}
  .hdr-select{font-size:11px;max-width:160px}
  .tab-bar{padding:0 14px}
  main{padding:24px 16px 60px}
  .split-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header class="hdr" role="banner">
  <div class="hdr-left">
    <a class="hub-back" href="../index.html" title="Back to hub">
      <span class="hub-back-glyph">⌂</span>
    </a>
    <h1 class="hdr-wordmark">Amas<em> Models</em></h1>
    <div class="hdr-divider"></div>

    <span class="hdr-select-label">Inst</span>
    <select id="instrument-select" class="hdr-select" aria-label="Instrument">
      <option value="NQ">NQ</option>
      <option value="ES">ES</option>
    </select>

    <span class="hdr-select-label">Model</span>
    <select id="model-select" class="hdr-select" aria-label="Model" disabled>
      <option disabled selected>Loading…</option>
    </select>
  </div>

  <div class="hdr-right">
    <button class="theme-btn" id="theme-btn" type="button" aria-label="Toggle theme" title="Toggle theme">☀️</button>
  </div>
</header>

<nav class="tab-bar" role="tablist" aria-label="Sections">
  <button class="tab active" role="tab" data-tab="overview">Overview</button>
  <button class="tab" role="tab" data-tab="breakdowns">Breakdowns</button>
  <button class="tab" role="tab" data-tab="filters">Filters</button>
  <button class="tab" role="tab" data-tab="trades">Trades</button>
  <button class="tab" role="tab" data-tab="walkforward">Walk-Forward</button>
  <button class="tab" role="tab" data-tab="spec">Spec</button>
</nav>

<main id="main">

  <div id="placeholder" class="placeholder">
    <div class="placeholder-icon">📐</div>
    <div class="placeholder-title">No model selected.</div>
    <p class="placeholder-body">
      Register a model in <code>engine/models/__init__.py</code> and re-run the engine.
    </p>
  </div>

  <div id="model-content">
    <div id="panel-overview"   class="tab-panel active"></div>
    <div id="panel-breakdowns" class="tab-panel"></div>
    <div id="panel-filters"    class="tab-panel"></div>
    <div id="panel-trades"     class="tab-panel"></div>
    <div id="panel-walkforward" class="tab-panel"></div>
    <div id="panel-spec"       class="tab-panel"></div>
  </div>

</main>

<footer>
  Amas Models · NQ &amp; ES Futures · Phase 3 · h1_continuation
</footer>

<script>
(function () {
  'use strict';

  // ── Theme toggle ────────────────────────────────────────────────────────
  // Shared key with hub + Fractal Sweep dashboards.
  var THEME_KEY = 'hub-theme';
  var INSTRUMENT_KEY = 'amas-instrument';

  function currentTheme() {
    return document.documentElement.getAttribute('data-theme') || 'dark';
  }

  function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem(THEME_KEY, t);
    var btn = document.getElementById('theme-btn');
    if (btn) btn.textContent = (t === 'dark') ? '☀️' : '🌙';
  }

  function toggleTheme() {
    setTheme(currentTheme() === 'dark' ? 'light' : 'dark');
  }

  // Initial paint of the toggle glyph (theme already applied by early-paint script).
  (function syncThemeBtn() {
    var btn = document.getElementById('theme-btn');
    if (btn) btn.textContent = (currentTheme() === 'dark') ? '☀️' : '🌙';
  })();

  document.getElementById('theme-btn').addEventListener('click', toggleTheme);

  // ── Instrument selector (cosmetic for now; persists for Phase 3+) ───────
  var instSel = document.getElementById('instrument-select');
  var savedInst = localStorage.getItem(INSTRUMENT_KEY);
  if (savedInst === 'NQ' || savedInst === 'ES') {
    instSel.value = savedInst;
  }
  instSel.addEventListener('change', function () {
    localStorage.setItem(INSTRUMENT_KEY, instSel.value);
  });

  // ── Tab switching ───────────────────────────────────────────────────────
  var tabs = document.querySelectorAll('.tab');
  tabs.forEach(function (t) {
    t.addEventListener('click', function () {
      tabs.forEach(function (x) { x.classList.remove('active'); });
      t.classList.add('active');
      var name = t.getAttribute('data-tab');
      var panels = document.querySelectorAll('.tab-panel');
      panels.forEach(function (p) { p.classList.remove('active'); });
      var active = document.getElementById('panel-' + name);
      if (active) active.classList.add('active');
    });
  });

  // ── Helpers ─────────────────────────────────────────────────────────────
  function esc(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
  function fmtPct(p, digits) {
    if (p == null || isNaN(p)) return '—';
    return (p * 100).toFixed(digits == null ? 1 : digits) + '%';
  }
  function fmtR(r, digits) {
    if (r == null || isNaN(r)) return '—';
    var d = digits == null ? 3 : digits;
    var s = r >= 0 ? '+' : '';
    return s + r.toFixed(d) + 'R';
  }
  function fmtNum(n, digits) {
    if (n == null || isNaN(n)) return '—';
    return Number(n).toFixed(digits == null ? 2 : digits);
  }
  function truncTs(ts) {
    if (!ts) return '';
    // "2014-09-30 11:00:00-04:00" -> "2014-09-30 11:00"
    var s = String(ts);
    return s.length >= 16 ? s.slice(0, 16) : s;
  }

  // Wilson 95% CI — mirrors engine/stats.py:wilson_ci
  function wilsonCI(wins, n, z) {
    if (z == null) z = 1.96;
    if (!n || n <= 0) return [0, 1];
    var p = wins / n;
    var denom = 1 + z * z / n;
    var center = (p + z * z / (2 * n)) / denom;
    var spread = z * Math.sqrt(p * (1 - p) / n + z * z / (4 * n * n)) / denom;
    return [Math.max(0, center - spread), Math.min(1, center + spread)];
  }

  function fmtWR(wr, lo, hi, digits) {
    if (wr == null) return '—';
    var d = digits == null ? 1 : digits;
    var ciStr = (lo != null && hi != null)
      ? '[' + (lo * 100).toFixed(d) + '%, ' + (hi * 100).toFixed(d) + '%]'
      : '';
    return (wr * 100).toFixed(d) + '% <span class="ci">' + ciStr + '</span>';
  }

  // Aggregate a list of trade rows. Mirrors engine/stats.py:agg semantics
  // (excluding EXPIRED trades from WR/EV/PF, including all in N).
  function aggTrades(rows) {
    var n = rows.length;
    var resolved = rows.filter(function (r) { return r.outcome !== 'EXPIRED'; });
    var nResolved = resolved.length;
    var nExpired = n - nResolved;
    if (nResolved === 0) {
      return {
        n: n, n_resolved: 0, n_expired: nExpired,
        wins: 0, wr: null, wr_ci_low: null, wr_ci_high: null,
        ev: null, pf: null,
        draw_hits: rows.filter(function (r) { return r.draw_hit; }).length,
        draw_hit_rate: n > 0 ? rows.filter(function (r) { return r.draw_hit; }).length / n : null,
      };
    }
    var wins = resolved.filter(function (r) { return (r.r || 0) > 0; }).length;
    var wr = wins / nResolved;
    var ev = resolved.reduce(function (s, r) { return s + (r.r || 0); }, 0) / nResolved;
    var grossWin = resolved.reduce(function (s, r) { return s + Math.max(0, r.r || 0); }, 0);
    var grossLoss = resolved.reduce(function (s, r) { return s + Math.min(0, r.r || 0); }, 0);
    var pf = grossLoss < 0 ? grossWin / Math.abs(grossLoss) : null;
    var ci = wilsonCI(wins, nResolved);
    var drawHits = rows.filter(function (r) { return r.draw_hit; }).length;
    return {
      n: n, n_resolved: nResolved, n_expired: nExpired,
      wins: wins, wr: wr, wr_ci_low: ci[0], wr_ci_high: ci[1],
      ev: ev, pf: pf,
      draw_hits: drawHits,
      draw_hit_rate: n > 0 ? drawHits / n : null,
    };
  }

  // ── Data load ───────────────────────────────────────────────────────────
  function showError(msg) {
    var ph = document.getElementById('placeholder');
    var content = document.getElementById('model-content');
    content.style.display = 'none';
    ph.innerHTML =
      '<div class="error-card">' +
        '<div class="error-card-icon">⚠️</div>' +
        '<div>' +
          '<div class="error-card-title">Could not load model_stats.json</div>' +
          '<div class="error-card-body">' + msg + '</div>' +
        '</div>' +
      '</div>';
    ph.style.display = 'block';
  }

  function populateModelSelector(models) {
    var sel = document.getElementById('model-select');
    sel.innerHTML = '';
    var keys = Object.keys(models || {});

    if (keys.length === 0) {
      var opt = document.createElement('option');
      opt.disabled = true;
      opt.selected = true;
      opt.textContent = 'No models registered yet';
      sel.appendChild(opt);
      sel.disabled = true;
      return;
    }

    sel.disabled = false;
    keys.forEach(function (k, i) {
      var o = document.createElement('option');
      o.value = k;
      o.textContent = (models[k] && models[k].label) ? (k + ' — ' + models[k].label) : k;
      if (i === 0) o.selected = true;
      sel.appendChild(o);
    });
  }

  function showPlaceholder(empty) {
    var ph = document.getElementById('placeholder');
    var content = document.getElementById('model-content');
    if (empty) {
      ph.style.display = 'flex';
      content.style.display = 'none';
    } else {
      ph.style.display = 'none';
      content.style.display = 'block';
    }
  }

  function loadStats() {
    fetch('./model_stats.json', { cache: 'no-store' })
      .then(function (res) {
        if (!res.ok) {
          throw new Error('HTTP ' + res.status);
        }
        return res.json();
      })
      .then(function (stats) {
        window.__stats = stats;
        var models = (stats && stats.models) || {};
        populateModelSelector(models);
        var keys = Object.keys(models);
        showPlaceholder(keys.length === 0);
        if (keys.length > 0) {
          renderModel(models[keys[0]]);
          var sel = document.getElementById('model-select');
          sel.addEventListener('change', function () {
            var k = sel.value;
            if (models[k]) renderModel(models[k]);
          });
        }
      })
      .catch(function (err) {
        showError(
          'has the engine run yet? Try ' +
          '<code>python3 engine/model_stats.py</code> from the ' +
          '<code>Amas Models/</code> folder.'
        );
        populateModelSelector({});
        if (window.console) console.error('[amas-dashboard] fetch failed:', err);
      });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadStats);
  } else {
    loadStats();
  }

  // ── Per-model render dispatch ───────────────────────────────────────────
  function renderModel(model) {
    if (!model) return;
    window.__model = model;
    renderOverview(model);
    renderBreakdowns(model);
    renderFilters(model);
    renderTrades(model);
    renderWalkforward(model);
    renderSpec(model);
  }

  // ── Tab 1: OVERVIEW ─────────────────────────────────────────────────────
  function renderOverview(model) {
    var panel = document.getElementById('panel-overview');
    var s = model.summary || {};
    var trades = model.trades || [];

    var drawHits = trades.reduce(function (a, t) { return a + (t.draw_hit ? 1 : 0); }, 0);
    var drawRate = trades.length ? drawHits / trades.length : null;

    var longs  = trades.filter(function (t) { return t.direction === 'long'; });
    var shorts = trades.filter(function (t) { return t.direction === 'short'; });
    var lAgg = aggTrades(longs);
    var sAgg = aggTrades(shorts);

    var evClass = (s.ev != null && s.ev > 0) ? 'pos' : (s.ev != null && s.ev < 0 ? 'neg' : '');

    var expiredWarn = '';
    if (s.n && s.n_expired && (s.n_expired / s.n) > 0.05) {
      expiredWarn = '<div class="warn-chip">⚠ ' + s.n_expired +
                    ' expired trades may hide losses</div>';
    }

    var html = '';
    html += '<div class="card">';
    html += '<div class="card-title">Headline · ' + esc(model.label || '') + '</div>';
    html += expiredWarn;
    html += '<div class="metric-strip">';
    html +=   tile('N Trades', String(s.n != null ? s.n : trades.length),
                   'resolved ' + (s.n_resolved != null ? s.n_resolved : '—') +
                   ' · expired ' + (s.n_expired != null ? s.n_expired : '—'));
    html +=   tile('1R Win Rate',
                   s.wr != null ? (s.wr * 100).toFixed(1) + '%' : '—',
                   s.wr_ci_low != null
                     ? '[' + (s.wr_ci_low * 100).toFixed(1) + '%, ' +
                       (s.wr_ci_high * 100).toFixed(1) + '%]'
                     : '');
    html +=   tileColored('EV', fmtR(s.ev, 3), 'mean R per resolved trade', evClass);
    html +=   tile('Profit Factor',
                   s.pf != null ? s.pf.toFixed(2) : '—',
                   'gross win R / |gross loss R|');
    html +=   tile('Avg Risk', s.avg_risk_pts != null ? s.avg_risk_pts.toFixed(2) + ' pts' : '—',
                   'avg MAE ' + (s.avg_mae_pts != null ? s.avg_mae_pts.toFixed(2) : '—') +
                   ' · MFE ' + (s.avg_mfe_pts != null ? s.avg_mfe_pts.toFixed(2) : '—'));
    html +=   tile('Draw-Hit Rate',
                   drawRate != null ? (drawRate * 100).toFixed(1) + '%' : '—',
                   drawHits + ' / ' + trades.length + ' trades');
    html += '</div>';

    html += '<div class="split-row">';
    html += '<div class="split-tile long">' +
              '<div class="split-label">Long</div>' +
              '<div class="split-value">' +
                'N=' + lAgg.n + ' · WR ' +
                (lAgg.wr != null ? (lAgg.wr * 100).toFixed(1) + '%' : '—') +
                ' · EV ' + fmtR(lAgg.ev, 3) +
              '</div>' +
            '</div>';
    html += '<div class="split-tile short">' +
              '<div class="split-label">Short</div>' +
              '<div class="split-value">' +
                'N=' + sAgg.n + ' · WR ' +
                (sAgg.wr != null ? (sAgg.wr * 100).toFixed(1) + '%' : '—') +
                ' · EV ' + fmtR(sAgg.ev, 3) +
              '</div>' +
            '</div>';
    html += '</div>';
    html += '</div>';

    html += '<div class="card">';
    html += '<div class="card-title">Equity Curve · Cumulative R</div>';
    html += '<div class="card-sub">Each resolved trade contributes its <code>r</code>; expired trades contribute 0. Trade index on the X axis.</div>';
    html += '<div class="equity-wrap" id="equity-wrap"></div>';
    html += '</div>';

    panel.innerHTML = html;

    drawEquityCurve(document.getElementById('equity-wrap'), trades);
  }

  function tile(label, value, sub) {
    return '<div class="metric-tile">' +
             '<div class="metric-label">' + esc(label) + '</div>' +
             '<div class="metric-value">' + value + '</div>' +
             (sub ? '<div class="metric-sub">' + sub + '</div>' : '') +
           '</div>';
  }
  function tileColored(label, value, sub, cls) {
    return '<div class="metric-tile">' +
             '<div class="metric-label">' + esc(label) + '</div>' +
             '<div class="metric-value ' + (cls || '') + '">' + value + '</div>' +
             (sub ? '<div class="metric-sub">' + sub + '</div>' : '') +
           '</div>';
  }

  // ── Equity curve SVG ────────────────────────────────────────────────────
  function drawEquityCurve(container, trades) {
    if (!container) return;
    if (!trades || !trades.length) {
      container.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:8px">No trades to plot.</div>';
      return;
    }

    // Build cumulative equity in R order: trade index across resolved trades only.
    // Per spec: each resolved trade contributes r, expired contributes 0.
    var sorted = trades.slice().sort(function (a, b) {
      var ta = a.anchor_ts || '', tb = b.anchor_ts || '';
      return ta < tb ? -1 : ta > tb ? 1 : 0;
    });
    var pts = [{ i: 0, eq: 0 }];
    var cum = 0;
    sorted.forEach(function (t, idx) {
      var contribute = (t.outcome === 'EXPIRED') ? 0 : (t.r || 0);
      cum += contribute;
      pts.push({ i: idx + 1, eq: cum });
    });

    var W = 760, H = 220;
    var ml = 56, mr = 32, mt = 16, mb = 30;
    var cw = W - ml - mr, ch = H - mt - mb;
    var n = pts.length;

    var ys = pts.map(function (p) { return p.eq; });
    var ymin = Math.min.apply(null, ys);
    var ymax = Math.max.apply(null, ys);
    if (ymax === ymin) { ymax = ymin + 1; }
    var pad = (ymax - ymin) * 0.1;
    var yLo = ymin - pad, yHi = ymax + pad;

    function xS(i) { return (i / Math.max(1, n - 1)) * cw; }
    function yS(v) { return ((yHi - v) / (yHi - yLo)) * ch; }

    // Line path
    var lp = '';
    for (var i = 0; i < n; i++) {
      lp += (i === 0 ? 'M' : 'L') + xS(pts[i].i).toFixed(1) + ',' + yS(pts[i].eq).toFixed(1) + ' ';
    }

    // Fill (line down to baseline at 0R)
    var yZero = yS(0);
    var fillP = 'M' + xS(pts[0].i).toFixed(1) + ',' + yZero.toFixed(1) + ' ';
    for (var j = 0; j < n; j++) {
      fillP += 'L' + xS(pts[j].i).toFixed(1) + ',' + yS(pts[j].eq).toFixed(1) + ' ';
    }
    fillP += 'L' + xS(pts[n - 1].i).toFixed(1) + ',' + yZero.toFixed(1) + ' Z';

    // Y ticks: ~5 evenly spaced, integer-friendly
    function niceStep(range) {
      var raw = range / 5;
      var mag = Math.pow(10, Math.floor(Math.log10(Math.max(raw, 1e-9))));
      var r = raw / mag;
      var step = r < 1.5 ? 1 : r < 3 ? 2 : r < 7 ? 5 : 10;
      return step * mag;
    }
    var step = niceStep(yHi - yLo);
    var grid = '', yl = '';
    var t0 = Math.ceil(yLo / step) * step;
    for (var t = t0; t <= yHi + 1e-6; t += step) {
      var y = yS(t);
      var isZero = Math.abs(t) < step * 0.0001;
      grid += '<line x1="0" y1="' + y.toFixed(1) + '" x2="' + cw + '" y2="' + y.toFixed(1) +
              '" stroke="var(--border)" stroke-width="' + (isZero ? '1.2' : '1') +
              '" stroke-dasharray="' + (isZero ? '4,3' : '2,4') +
              '" opacity="' + (isZero ? '0.9' : '0.5') + '"/>';
      yl += '<text x="-8" y="' + (y + 4).toFixed(1) +
            '" text-anchor="end" font-size="10" fill="var(--text-muted)" ' +
            'font-family="var(--font-data)">' + t.toFixed(0) + 'R</text>';
    }

    // X ticks: 0, mid, end
    var xticks = '';
    [0, Math.floor((n - 1) / 2), n - 1].forEach(function (idx) {
      var p = pts[idx];
      var xv = xS(p.i);
      xticks += '<text x="' + xv.toFixed(1) + '" y="' + (ch + 18) + '" text-anchor="middle" ' +
                'font-size="10" fill="var(--text-muted)" font-family="var(--font-data)">#' + p.i + '</text>';
    });

    // Endpoint labels: start (0R) and end value
    var startEq = pts[0].eq, endEq = pts[n - 1].eq;
    var endX = xS(pts[n - 1].i), endY = yS(endEq);
    var lblColor = endEq >= 0 ? 'var(--green)' : 'var(--red)';
    var endLbl =
      '<circle cx="' + endX.toFixed(1) + '" cy="' + endY.toFixed(1) +
      '" r="3.5" fill="' + lblColor + '"/>' +
      '<text x="' + (endX - 6).toFixed(1) + '" y="' + (endY - 8).toFixed(1) +
      '" text-anchor="end" font-size="11" font-weight="700" ' +
      'fill="' + lblColor + '" font-family="var(--font-data)">' +
      (endEq >= 0 ? '+' : '') + endEq.toFixed(1) + 'R</text>';
    var startLbl =
      '<circle cx="' + xS(pts[0].i).toFixed(1) + '" cy="' + yS(startEq).toFixed(1) +
      '" r="3" fill="var(--text-muted)"/>' +
      '<text x="' + (xS(pts[0].i) + 6).toFixed(1) + '" y="' + (yS(startEq) - 6).toFixed(1) +
      '" text-anchor="start" font-size="10" fill="var(--text-muted)" ' +
      'font-family="var(--font-data)">0R</text>';

    var fillColor = endEq >= 0 ? 'var(--green)' : 'var(--red)';

    var svg =
      '<svg class="equity-svg" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Equity curve">' +
        '<g transform="translate(' + ml + ',' + mt + ')">' +
          grid +
          '<path d="' + fillP + '" fill="' + fillColor + '" fill-opacity="0.10"/>' +
          '<path d="' + lp.trim() + '" fill="none" stroke="var(--accent)" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>' +
          startLbl +
          endLbl +
          yl +
          xticks +
        '</g>' +
      '</svg>';

    container.innerHTML = svg;
  }

  // ── Tab 2: BREAKDOWNS ───────────────────────────────────────────────────
  function renderBreakdowns(model) {
    var panel = document.getElementById('panel-breakdowns');
    var trades = model.trades || [];

    var byYear = {};
    var byDir  = {};
    var byPat  = {};

    trades.forEach(function (t) {
      var y = (t.anchor_ts || '').slice(0, 4);
      (byYear[y]  = byYear[y]  || []).push(t);
      (byDir[t.direction]     = byDir[t.direction]     || []).push(t);
      (byPat[t.entry_pattern] = byPat[t.entry_pattern] || []).push(t);
    });

    function rowsFromGroups(groups, sortFn) {
      var keys = Object.keys(groups).sort(sortFn);
      return keys.map(function (k) {
        var rows = groups[k];
        var a = aggTrades(rows);
        return { key: k, agg: a };
      });
    }

    function tableHTML(title, sub, rows, keyHeader) {
      var html = '';
      html += '<div class="card">';
      html += '<div class="card-title">' + esc(title) + '</div>';
      if (sub) html += '<div class="card-sub">' + sub + '</div>';
      html += '<div class="tbl-wrap"><table class="tbl"><thead><tr>';
      html += '<th>' + esc(keyHeader) + '</th>';
      html += '<th>N</th>';
      html += '<th>Resolved</th>';
      html += '<th>1R-WR</th>';
      html += '<th>Draw-Hit</th>';
      html += '<th>EV (R)</th>';
      html += '<th>PF</th>';
      html += '</tr></thead><tbody>';

      rows.forEach(function (r) {
        var a = r.agg;
        var lowN = a.n_resolved < 30
          ? '<span class="lowN" title="N < 30 — interpret with care">⚠</span>' : '';
        var wrCell = a.wr != null
          ? (a.wr * 100).toFixed(1) + '% <span class="ci">[' +
            (a.wr_ci_low * 100).toFixed(1) + '%, ' +
            (a.wr_ci_high * 100).toFixed(1) + '%]</span>'
          : '—';
        html += '<tr>' +
                  '<td>' + esc(r.key || '—') + lowN + '</td>' +
                  '<td>' + a.n + '</td>' +
                  '<td>' + a.n_resolved + '</td>' +
                  '<td>' + wrCell + '</td>' +
                  '<td>' + (a.draw_hit_rate != null ? (a.draw_hit_rate * 100).toFixed(1) + '%' : '—') + '</td>' +
                  '<td>' + (a.ev != null ? fmtR(a.ev, 3) : '—') + '</td>' +
                  '<td>' + (a.pf != null ? a.pf.toFixed(2) : '—') + '</td>' +
                '</tr>';
      });

      html += '</tbody></table></div></div>';
      return html;
    }

    var html = '';
    html += tableHTML('By Year', 'Year-by-year stability check.',
                     rowsFromGroups(byYear, function (a, b) { return a < b ? -1 : 1; }),
                     'Year');
    html += tableHTML('By Direction', 'Long vs short.',
                     rowsFromGroups(byDir, function (a, b) { return a < b ? -1 : 1; }),
                     'Direction');
    html += tableHTML('By Entry Pattern', 'Entry mechanic distribution.',
                     rowsFromGroups(byPat, function (a, b) { return a < b ? -1 : 1; }),
                     'Pattern');

    panel.innerHTML = html;
  }

  // ── Tab 3: FILTERS ──────────────────────────────────────────────────────
  // Pass-flag mapping: filter key → trade row field.
  function passField(key) { return 'passes_' + key; }

  // Compute draw-hit rate client-side for trades passing all selected filters.
  function drawHitForCombo(trades, comboKeys) {
    var matched = trades;
    for (var i = 0; i < comboKeys.length; i++) {
      var f = passField(comboKeys[i]);
      matched = matched.filter(function (t) { return t[f] === true; });
    }
    if (!matched.length) return null;
    var hits = matched.reduce(function (a, t) { return a + (t.draw_hit ? 1 : 0); }, 0);
    return hits / matched.length;
  }

  var filtersState = {
    sortKey: 'ev',
    sortDir: 'desc',
    rows: [],
  };

  function renderFilters(model) {
    var panel = document.getElementById('panel-filters');
    var variants = model.filter_variants || [];
    var trades = model.trades || [];

    // Pre-build display rows. Includes the empty (Baseline) combo.
    var rows = variants.map(function (v) {
      var combo = (v.filters || []).slice().sort(); // alphabetical
      var key = combo.join('+');
      var isBaseline = combo.length === 0;
      var s = v.stats || {};
      var drawRate = drawHitForCombo(trades, combo);
      return {
        combo: combo,
        comboLabel: isBaseline ? 'Baseline' : combo.join(' + '),
        isBaseline: isBaseline,
        n: s.n || 0,
        n_resolved: s.n_resolved || 0,
        wr: s.wr,
        wr_ci_low: s.wr_ci_low,
        wr_ci_high: s.wr_ci_high,
        ev: s.ev,
        pf: s.pf,
        drawRate: drawRate,
      };
    });

    // Identify "Best": top non-baseline by EV (where EV is defined).
    var bestEv = -Infinity, bestKey = null;
    rows.forEach(function (r) {
      if (!r.isBaseline && r.ev != null && r.ev > bestEv) {
        bestEv = r.ev;
        bestKey = r.combo.join('+');
      }
    });
    rows.forEach(function (r) {
      r.isBest = !r.isBaseline && r.combo.join('+') === bestKey;
    });

    filtersState.rows = rows;

    panel.innerHTML =
      '<div class="card">' +
        '<div class="card-title">Filter Variants</div>' +
        '<div class="card-sub">' +
          'All ' + variants.length + ' filter combinations precomputed by the engine. ' +
          'Click a column header to sort. Baseline = no filters; Best = highest EV non-baseline combo. ' +
          'Cells with N&lt;30 are flagged.' +
        '</div>' +
        '<div class="tbl-wrap tbl-scroll">' +
          '<table class="tbl" id="filters-tbl">' +
            '<thead><tr id="filters-head"></tr></thead>' +
            '<tbody id="filters-body"></tbody>' +
          '</table>' +
        '</div>' +
      '</div>';

    var headEl = document.getElementById('filters-head');
    var cols = [
      { k: 'combo',     label: 'Filter Combo' },
      { k: 'n',         label: 'N' },
      { k: 'wr',        label: '1R-WR' },
      { k: 'ev',        label: 'EV (R)' },
      { k: 'pf',        label: 'PF' },
      { k: 'drawRate',  label: 'Draw-Hit' },
    ];
    cols.forEach(function (c) {
      var th = document.createElement('th');
      th.className = 'sortable';
      th.dataset.sortKey = c.k;
      th.innerHTML = esc(c.label) + '<span class="sort-arrow">▼</span>';
      th.addEventListener('click', function () {
        if (filtersState.sortKey === c.k) {
          filtersState.sortDir = filtersState.sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          filtersState.sortKey = c.k;
          filtersState.sortDir = c.k === 'combo' ? 'asc' : 'desc';
        }
        renderFiltersBody();
      });
      headEl.appendChild(th);
    });

    renderFiltersBody();
  }

  function renderFiltersBody() {
    var rows = filtersState.rows.slice();
    var key = filtersState.sortKey;
    var dir = filtersState.sortDir;
    rows.sort(function (a, b) {
      var av, bv;
      if (key === 'combo') { av = a.comboLabel; bv = b.comboLabel; }
      else { av = a[key]; bv = b[key]; }
      // null values → sort last
      var aNull = av == null || (typeof av === 'number' && isNaN(av));
      var bNull = bv == null || (typeof bv === 'number' && isNaN(bv));
      if (aNull && bNull) return 0;
      if (aNull) return 1;
      if (bNull) return -1;
      if (av < bv) return dir === 'asc' ? -1 : 1;
      if (av > bv) return dir === 'asc' ? 1 : -1;
      return 0;
    });

    // Update sort arrows
    var ths = document.querySelectorAll('#filters-head th');
    ths.forEach(function (th) {
      th.classList.remove('sort-asc', 'sort-desc');
      var arr = th.querySelector('.sort-arrow');
      if (th.dataset.sortKey === key) {
        th.classList.add(dir === 'asc' ? 'sort-asc' : 'sort-desc');
        if (arr) arr.textContent = dir === 'asc' ? '▲' : '▼';
      } else if (arr) {
        arr.textContent = '▼';
      }
    });

    var frag = document.createDocumentFragment();
    rows.forEach(function (r) {
      var tr = document.createElement('tr');
      if (r.isBaseline) tr.className = 'row-baseline';
      else if (r.isBest) tr.className = 'row-best';

      var lowN = (r.n_resolved < 30 && !r.isBaseline)
        ? '<span class="lowN" title="N < 30 — interpret with care">⚠</span>' : '';
      var tag = r.isBaseline
        ? '<span class="tag tag-baseline">Baseline</span>'
        : (r.isBest ? '<span class="tag tag-best">Best</span>' : '');

      var wrCell = r.wr != null
        ? (r.wr * 100).toFixed(1) + '% <span class="ci">[' +
          (r.wr_ci_low * 100).toFixed(1) + '%, ' +
          (r.wr_ci_high * 100).toFixed(1) + '%]</span>'
        : '—';

      tr.innerHTML =
        '<td>' + esc(r.comboLabel) + tag + '</td>' +
        '<td>' + r.n + lowN + '</td>' +
        '<td>' + wrCell + '</td>' +
        '<td>' + (r.ev != null ? fmtR(r.ev, 3) : '—') + '</td>' +
        '<td>' + (r.pf != null ? r.pf.toFixed(2) : '—') + '</td>' +
        '<td>' + (r.drawRate != null ? (r.drawRate * 100).toFixed(1) + '%' : '—') + '</td>';
      frag.appendChild(tr);
    });
    var body = document.getElementById('filters-body');
    body.innerHTML = '';
    body.appendChild(frag);
  }

  // ── Tab 4: TRADES ───────────────────────────────────────────────────────
  var tradesState = {
    sortKey: 'anchor_ts',
    sortDir: 'asc',
    page: 0,
    pageSize: 100,
    rows: [],
  };

  function renderTrades(model) {
    var panel = document.getElementById('panel-trades');
    var trades = (model.trades || []).slice();
    tradesState.rows = trades;
    tradesState.page = 0;

    panel.innerHTML =
      '<div class="card">' +
        '<div class="card-title">All Trades · ' + trades.length + '</div>' +
        '<div class="card-sub">Click a column header to sort. Showing 100 rows per page.</div>' +
        '<div class="tbl-wrap">' +
          '<table class="tbl" id="trades-tbl">' +
            '<thead><tr id="trades-head"></tr></thead>' +
            '<tbody id="trades-body"></tbody>' +
          '</table>' +
        '</div>' +
        '<div class="pager">' +
          '<button class="pager-btn" id="trades-prev" type="button">‹ Prev</button>' +
          '<button class="pager-btn" id="trades-next" type="button">Next ›</button>' +
          '<span class="pager-info" id="trades-info"></span>' +
        '</div>' +
      '</div>';

    var cols = [
      { k: 'anchor_ts',     label: 'Anchor TS' },
      { k: 'direction',     label: 'Dir' },
      { k: 'entry_pattern', label: 'Pattern' },
      { k: 'entry_price',   label: 'Entry' },
      { k: 'sl_price',      label: 'SL' },
      { k: 'tp_price',      label: 'TP' },
      { k: 'risk_pts',      label: 'Risk Pts' },
      { k: 'outcome',       label: 'Outcome' },
      { k: 'r',             label: 'R' },
      { k: 'mae_pts',       label: 'MAE' },
      { k: 'mfe_pts',       label: 'MFE' },
      { k: 'draw_hit',      label: 'Draw' },
    ];
    var headEl = document.getElementById('trades-head');
    cols.forEach(function (c) {
      var th = document.createElement('th');
      th.className = 'sortable';
      th.dataset.sortKey = c.k;
      th.innerHTML = esc(c.label) + '<span class="sort-arrow">▼</span>';
      th.addEventListener('click', function () {
        if (tradesState.sortKey === c.k) {
          tradesState.sortDir = tradesState.sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          tradesState.sortKey = c.k;
          tradesState.sortDir = c.k === 'anchor_ts' ? 'asc' : 'desc';
        }
        tradesState.page = 0;
        renderTradesBody();
      });
      headEl.appendChild(th);
    });

    document.getElementById('trades-prev').addEventListener('click', function () {
      if (tradesState.page > 0) {
        tradesState.page--;
        renderTradesBody();
      }
    });
    document.getElementById('trades-next').addEventListener('click', function () {
      var total = tradesState.rows.length;
      var maxPage = Math.max(0, Math.ceil(total / tradesState.pageSize) - 1);
      if (tradesState.page < maxPage) {
        tradesState.page++;
        renderTradesBody();
      }
    });

    renderTradesBody();
  }

  function renderTradesBody() {
    var rows = tradesState.rows.slice();
    var key = tradesState.sortKey, dir = tradesState.sortDir;

    rows.sort(function (a, b) {
      var av = a[key], bv = b[key];
      // booleans (draw_hit) → coerce to 0/1
      if (typeof av === 'boolean' || typeof bv === 'boolean') {
        av = av ? 1 : 0;
        bv = bv ? 1 : 0;
      }
      var aNull = av == null || (typeof av === 'number' && isNaN(av));
      var bNull = bv == null || (typeof bv === 'number' && isNaN(bv));
      if (aNull && bNull) return 0;
      if (aNull) return 1;
      if (bNull) return -1;
      if (av < bv) return dir === 'asc' ? -1 : 1;
      if (av > bv) return dir === 'asc' ? 1 : -1;
      return 0;
    });

    // Update sort arrows
    document.querySelectorAll('#trades-head th').forEach(function (th) {
      th.classList.remove('sort-asc', 'sort-desc');
      var arr = th.querySelector('.sort-arrow');
      if (th.dataset.sortKey === key) {
        th.classList.add(dir === 'asc' ? 'sort-asc' : 'sort-desc');
        if (arr) arr.textContent = dir === 'asc' ? '▲' : '▼';
      } else if (arr) {
        arr.textContent = '▼';
      }
    });

    var total = rows.length;
    var start = tradesState.page * tradesState.pageSize;
    var end = Math.min(total, start + tradesState.pageSize);
    var slice = rows.slice(start, end);

    var frag = document.createDocumentFragment();
    slice.forEach(function (t) {
      var tr = document.createElement('tr');
      var dirCell = '<td class="' + (t.direction === 'long' ? 'long-cell' : 'short-cell') + '">' +
                    esc(t.direction || '') + '</td>';
      var outClass = t.outcome === 'TP' ? 'tp-cell'
                   : t.outcome === 'SL' ? 'sl-cell'
                   : 'exp-cell';
      var rClass = (t.r > 0) ? 'tp-cell' : (t.r < 0 ? 'sl-cell' : '');
      tr.innerHTML =
        '<td>' + esc(truncTs(t.anchor_ts)) + '</td>' +
        dirCell +
        '<td>' + esc(t.entry_pattern || '') + '</td>' +
        '<td>' + fmtNum(t.entry_price, 2) + '</td>' +
        '<td>' + fmtNum(t.sl_price, 2) + '</td>' +
        '<td>' + fmtNum(t.tp_price, 2) + '</td>' +
        '<td>' + fmtNum(t.risk_pts, 2) + '</td>' +
        '<td class="' + outClass + '">' + esc(t.outcome || '') + '</td>' +
        '<td class="' + rClass + '">' + (t.r != null ? (t.r >= 0 ? '+' : '') + t.r.toFixed(2) : '—') + '</td>' +
        '<td>' + fmtNum(t.mae_pts, 2) + '</td>' +
        '<td>' + fmtNum(t.mfe_pts, 2) + '</td>' +
        '<td>' + (t.draw_hit ? '<span class="tp-cell">✓</span>' : '<span style="color:var(--text-muted)">✗</span>') + '</td>';
      frag.appendChild(tr);
    });
    var body = document.getElementById('trades-body');
    body.innerHTML = '';
    body.appendChild(frag);

    document.getElementById('trades-info').textContent =
      'Showing ' + (total === 0 ? 0 : start + 1) + '–' + end + ' of ' + total;
    document.getElementById('trades-prev').disabled = tradesState.page === 0;
    document.getElementById('trades-next').disabled = end >= total;
  }

  // ── Tab 5: WALK-FORWARD ─────────────────────────────────────────────────
  function renderWalkforward(model) {
    var panel = document.getElementById('panel-walkforward');
    panel.innerHTML =
      '<div class="placeholder">' +
        '<div class="placeholder-icon">⏳</div>' +
        '<div class="placeholder-title">Walk-Forward · Coming in Phase 5</div>' +
        '<p class="placeholder-body">' +
          'Train→test rolling-window stability analysis. The engine will pre-compute ' +
          'walk-forward folds and this tab will surface them.' +
        '</p>' +
      '</div>';
  }

  // ── Tab 6: SPEC ─────────────────────────────────────────────────────────
  function renderSpec(model) {
    var panel = document.getElementById('panel-spec');
    if (model.spec_html && model.spec_html.length > 0) {
      panel.innerHTML = '<div class="card"><div class="card-title">Model Spec</div>' +
                        '<div class="spec-content">' + model.spec_html + '</div></div>';
      return;
    }
    panel.innerHTML =
      '<div class="placeholder">' +
        '<div class="placeholder-icon">📜</div>' +
        '<div class="placeholder-title">Spec · Coming in Phase 4</div>' +
        '<p class="placeholder-body">' +
          'Phase 4 will pre-render <code>docs/model_specs.md</code> for the selected model ' +
          'into <code>spec_html</code> on the model_stats.json payload.' +
        '</p>' +
      '</div>';
  }
})();
</script>

</body>
</html>
